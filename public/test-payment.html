<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>결제 테스트 | 안심상속</title>
<meta name="robots" content="noindex,nofollow"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#fffdf6;color:#06251d;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;gap:16px}
.badge{background:#06251d;color:#f1d586;border-radius:999px;padding:6px 14px;font-size:.8rem;font-weight:900;letter-spacing:.05em}
h1{font-size:1.3rem;font-weight:950;letter-spacing:-.04em;text-align:center}
p{color:#5e6b64;font-size:.9rem;font-weight:700;text-align:center;line-height:1.6}
.card{background:#fff;border:2px solid rgba(14,53,41,.12);border-radius:20px;padding:22px 20px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:12px}
.row{display:flex;justify-content:space-between;align-items:center;font-size:.9rem;font-weight:700}
.row span:last-child{color:#06251d;font-weight:950}
.divider{border:0;border-top:1px solid rgba(14,53,41,.1)}
.price{font-size:1.4rem;font-weight:950;color:#06251d}
.pay-btn{background:linear-gradient(135deg,#f5dc8a,#c99938);color:#1c221c;border:0;border-radius:18px;padding:16px;font-weight:950;font-size:1.05rem;cursor:pointer;width:100%;max-width:360px;box-shadow:0 12px 28px rgba(0,0,0,.18);touch-action:manipulation}
.pay-btn:disabled{opacity:.5;cursor:default}
.notice{font-size:.78rem;color:#5e6b64;font-weight:650;text-align:center;max-width:320px;line-height:1.6}
.err{color:#a02d19;font-size:.86rem;font-weight:800;text-align:center;min-height:20px}
.sep{width:100%;max-width:360px;border:0;border-top:1px dashed rgba(14,53,41,.15);margin:4px 0}
.test-info{background:#f0f9ff;border:1px solid rgba(12,74,110,.2);border-radius:12px;padding:14px;font-size:.82rem;color:#0c4a6e;font-weight:700;line-height:1.7;width:100%;max-width:360px}
.test-info b{display:block;margin-bottom:4px}
</style>
<script src="https://js.tosspayments.com/v1/payment"></script>
</head>
<body>

<div class="badge">🧪 결제 테스트 전용</div>
<h1>안심상속 유료 상세리포트</h1>
<p>설문 없이 바로 결제 흐름을 테스트합니다</p>

<div class="card">
  <div class="row"><span>상품</span><span>안심상속 유료 상세리포트</span></div>
  <hr class="divider"/>
  <div class="row"><span>결제금액</span><span class="price">₩49,000</span></div>
</div>

<div class="err" id="Err"></div>
<button class="pay-btn" id="PayBtn" type="button">결제 테스트 시작하기</button>

<hr class="sep"/>

<div class="test-info">
  <b>테스트 카드번호 (카드 직접 입력 선택 시)</b>
  카드번호: 4330-0000-0000-0000<br/>
  유효기간: 아무 값 (예: 12/26)<br/>
  CVC: 아무 값 (예: 123)<br/>
  비밀번호: 아무 값 (예: 00)
</div>

<p class="notice">이 페이지는 개발 테스트 전용입니다.<br/>실제 결제는 발생하지 않습니다.</p>

<script>
var TOSS_CLIENT_KEY = 'test_ck_oEjb0gm23PNx7RYKd7QvrpGwBJn5';
var REPORT_PRICE = 49000;

function genOrderId(){
  return 'ansim_'+Date.now()+'_'+Math.random().toString(36).slice(2,10);
}

document.getElementById('PayBtn').addEventListener('click', function(){
  var btn = document.getElementById('PayBtn');
  var err = document.getElementById('Err');
  err.textContent = '';

  if(typeof TossPayments === 'undefined'){
    err.textContent = 'Toss 결제 모듈을 불러오지 못했습니다. 새로고침 후 다시 시도해주세요.';
    return;
  }

  /* 더미 진단 데이터를 sessionStorage에 미리 세팅 — payment-success에서 orderId를 병합하려면 이 키가 있어야 함 */
  try{
    sessionStorage.setItem('ansim_report_request', JSON.stringify({
      email: 'test@ansimsangsok.kr',
      score: 72,
      answers: {
        family: '배우자+자녀2',
        assets: ['부동산','예금'],
        estateCount: '2',
        region: '서울',
        purpose: 'test'
      }
    }));
  }catch(e){}

  btn.disabled = true;
  btn.textContent = '결제창 여는 중...';

  try{
    var tossPayments = TossPayments(TOSS_CLIENT_KEY);
    tossPayments.requestPayment('카드', {
      amount: REPORT_PRICE,
      orderId: genOrderId(),
      orderName: '안심상속 유료 상세리포트',
      successUrl: window.location.origin + '/payment-success',
      failUrl: window.location.origin + '/payment-fail',
      customerEmail: 'test@ansimsangsok.kr'
    }).catch(function(e){
      btn.disabled = false;
      btn.textContent = '결제 테스트 시작하기';
      if(e && e.code === 'USER_CANCEL') return;
      err.textContent = '결제창 오류: ' + (e && e.message ? e.message : '알 수 없는 오류');
    });
  }catch(e){
    btn.disabled = false;
    btn.textContent = '결제 테스트 시작하기';
    err.textContent = '초기화 오류: ' + (e && e.message ? e.message : '알 수 없는 오류');
  }
});
</script>
</body>
</html>
