<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="robots" content="noindex"/>
<title>[DEV] 리포트 테스트 생성기</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Noto Sans KR",sans-serif;background:#0d1f17;color:#fffdf5;padding:20px;line-height:1.5}
  .wrap{max-width:760px;margin:0 auto}
  h1{font-size:1.1rem;margin-bottom:6px}
  .warn{background:rgba(241,213,134,.12);border:1px solid rgba(241,213,134,.4);border-radius:10px;padding:12px;font-size:.85rem;color:#f1d586;margin:12px 0}
  label{display:block;font-size:.82rem;color:rgba(255,253,245,.7);margin:14px 0 6px}
  input,textarea{width:100%;background:#10261c;color:#fffdf5;border:1px solid rgba(255,253,245,.2);border-radius:8px;padding:10px;font-size:.9rem;font-family:ui-monospace,Menlo,monospace}
  textarea{min-height:340px;resize:vertical;white-space:pre}
  .row{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
  button{background:#f1d586;color:#0d1f17;border:none;border-radius:9px;padding:12px 18px;font-weight:800;font-size:.92rem;cursor:pointer}
  button.sec{background:#1c3a2b;color:#fffdf5;border:1px solid rgba(255,253,245,.25)}
  .err{color:#ffb4b4;font-size:.85rem;margin-top:8px;min-height:1.2em}
  .preset{font-size:.78rem;padding:8px 12px}
</style>
</head>
<body>
<div class="wrap">
  <h1>리포트 테스트 생성기 (DEV)</h1>
  <div class="warn">결제·설문 없이 입력값만으로 리포트를 생성합니다. Vercel 환경변수 <b>DEV_REPORT_TOKEN</b>과 같은 토큰을 입력해야 작동합니다. 이 페이지는 검색엔진에 노출되지 않습니다(noindex).</div>

  <label>DEV 토큰 (Vercel 환경변수 DEV_REPORT_TOKEN 값)</label>
  <input id="tok" type="text" placeholder="토큰 입력 (한 번 넣으면 이 브라우저에 저장)" />

  <div class="row">
    <button class="sec preset" type="button" data-p="foreign">외국국적+부동산3+사업체</button>
    <button class="sec preset" type="button" data-p="house1">주택1채 형제균등</button>
    <button class="sec preset" type="button" data-p="gift">사전증여+간병</button>
  </div>

  <label>입력 JSON (자유롭게 편집 — answers / score / deepAnswers)</label>
  <textarea id="js"></textarea>

  <div class="row">
    <button type="button" id="go">이 입력으로 리포트 생성 ▸</button>
    <button class="sec" type="button" id="fmt">JSON 정렬</button>
  </div>
  <div class="err" id="err"></div>
</div>

<script>
var PRESETS = {
  foreign: {
    score:100,
    answers:{ assetPresence:['house','land','incomeRealEstate'], assetCounts:{house:'1',land:'1',incomeRealEstate:'1'}, overseas:['overseas_deposit'], assetTypes:[] },
    deepAnswers:{
      totalAssets:'100억 이상', realEstateValue:'100억 이상', debt:'1억 이상',
      financialAssets:'1억 미만', overseasAssetValue:'1억 미만', overseasAssetType:'예금',
      spouseStatus:'생존(혼인관계 유지·동거)', spouseNationality:'한국 국적 + 해외 영주권',
      childrenCount:'2명', parentsAlive:'사망', siblingsCount:'0명',
      childrenNationality:'일부 외국 국적', foreignNatChildren:'2명',
      businessShare:'50% 초과', realEstateCount:'3건',
      priorGiftAmount:'1억~5억', priorGiftTiming:'과거',
      caregivingContribution:'있음', conflictDetail:'', predeceasedChild:'없음', expertNeed:''
    }
  },
  house1: {
    score:62,
    answers:{ assetPresence:['house'], assetCounts:{house:'1'}, overseas:[], assetTypes:[] },
    deepAnswers:{
      totalAssets:'10억~30억', realEstateValue:'10억~30억', debt:'없음',
      financialAssets:'1억 미만',
      spouseStatus:'사망', childrenCount:'3명', parentsAlive:'사망', siblingsCount:'0명',
      childrenNationality:'모두 한국 국적', foreignNatChildren:'0명',
      realEstateCount:'1건', priorGiftAmount:'', caregivingContribution:'', conflictDetail:''
    }
  },
  gift: {
    score:72,
    answers:{ assetPresence:['house','incomeRealEstate'], assetCounts:{house:'1',incomeRealEstate:'1'}, overseas:[], assetTypes:[] },
    deepAnswers:{
      totalAssets:'30억~100억', realEstateValue:'30억~100억', debt:'1천만~1억',
      financialAssets:'1억~3억',
      spouseStatus:'생존(혼인관계 유지·동거)', childrenCount:'2명', parentsAlive:'사망', siblingsCount:'0명',
      childrenNationality:'모두 한국 국적', foreignNatChildren:'0명',
      realEstateCount:'2건', priorGiftAmount:'1억~5억', priorGiftTiming:'5년 전',
      caregivingContribution:'있음', conflictDetail:'형제간 갈등 조짐'
    }
  }
};

var ge=function(id){return document.getElementById(id);};
function loadPreset(name){
  ge('js').value = JSON.stringify(PRESETS[name], null, 2);
}
loadPreset('foreign');
try{ var savedTok=localStorage.getItem('ansim_dev_token'); if(savedTok) ge('tok').value=savedTok; }catch(e){}

[].forEach.call(document.querySelectorAll('.preset'), function(b){
  b.onclick=function(){ loadPreset(b.getAttribute('data-p')); ge('err').textContent=''; };
});

ge('fmt').onclick=function(){
  try{ ge('js').value=JSON.stringify(JSON.parse(ge('js').value),null,2); ge('err').textContent=''; }
  catch(e){ ge('err').textContent='JSON 형식 오류: '+e.message; }
};

ge('go').onclick=function(){
  ge('err').textContent='';
  var tok=ge('tok').value.trim();
  if(!tok){ ge('err').textContent='DEV 토큰을 입력하세요.'; return; }
  var obj;
  try{ obj=JSON.parse(ge('js').value); }
  catch(e){ ge('err').textContent='JSON 형식 오류: '+e.message; return; }
  try{ localStorage.setItem('ansim_dev_token', tok); }catch(e){}
  var req={
    answers: obj.answers||{},
    score: typeof obj.score==='number'?obj.score:0,
    deepAnswers: obj.deepAnswers||{},
    orderId: 'dev-'+Date.now(),
    devToken: tok
  };
  try{
    sessionStorage.setItem('ansim_report_request', JSON.stringify(req));
    localStorage.setItem('ansim_report_request_backup', JSON.stringify(req));
  }catch(e){ ge('err').textContent='저장 실패: '+e.message; return; }
  window.location.href='/report';
};
</script>
</body>
</html>
