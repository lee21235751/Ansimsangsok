<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>안심상속 유료 상세리포트</title>
<meta name="robots" content="noindex,nofollow"/>
<style>
:root{--FD:#06251d;--F:#0e3529;--G:#d7ad55;--GL:#f1d586;--MU:#5e6b64;--LN:rgba(14,53,41,.15)}
*,*::before,*::after{box-sizing:border-box;margin:0}
body{font-family:system-ui,-apple-system,sans-serif;color:#12231d;word-break:keep-all;background:#fffdf6}
.w{width:min(720px,calc(100% - 32px));margin:0 auto}
.dn{display:none!important}

/* 헤더 */
.hdr{background:linear-gradient(145deg,#082d22,#163b2a 60%,#24381f);color:#fffdf5;padding:32px 0 28px}
.badge{display:inline-flex;border:1px solid rgba(215,173,85,.6);color:var(--GL);border-radius:999px;padding:7px 13px;font-weight:900;font-size:.85rem;margin-bottom:14px}
.hdr h1{font-size:clamp(1.8rem,6vw,2.6rem);font-weight:950;letter-spacing:-.06em;line-height:1.1;margin-bottom:8px}
.hdr p{color:rgba(255,253,245,.75);font-size:1rem;font-weight:700;margin-bottom:18px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:6px 12px;border-radius:999px;font-size:.85rem;font-weight:900;background:rgba(255,255,255,.1);border:1px solid rgba(215,173,85,.4);color:var(--GL)}

/* 섹션 */
.body{padding:24px 0 60px}
.sec{background:#fff;border:1px solid var(--LN);border-radius:20px;padding:clamp(18px,4vw,26px);margin-bottom:14px}
.sec-ey{display:inline-flex;padding:5px 11px;border-radius:999px;background:var(--FD);color:#fff8dc;font-size:.78rem;font-weight:950;margin-bottom:10px}
.sec-t{font-size:clamp(1.15rem,4vw,1.45rem);font-weight:950;letter-spacing:-.04em;color:var(--FD);margin-bottom:8px}
.sec-d{color:var(--MU);font-size:.97rem;line-height:1.72;font-weight:700;margin-bottom:14px}

/* 포인트 리스트 */
.pts{display:grid;gap:8px}
.pt{padding:12px 14px;border-radius:14px;background:#f8fafc;border-left:3px solid var(--G);font-size:.97rem;font-weight:750;line-height:1.6;color:var(--FD)}

/* 체크 리스트 */
.cks{display:grid;gap:8px}
.ck{display:flex;align-items:flex-start;gap:9px;padding:11px 13px;border-radius:14px;background:#fff8e8;border:1px solid rgba(14,53,41,.1);font-size:.97rem;font-weight:750;line-height:1.55;color:var(--FD)}
.ck::before{content:"✓";color:var(--G);font-weight:900;flex-shrink:0;margin-top:1px}

/* 서류 그룹 */
.dg{margin-bottom:14px}
.dg-l{font-size:.85rem;font-weight:950;color:var(--MU);margin-bottom:7px;letter-spacing:.04em}

/* 블라인드스팟 */
.bs{padding:14px 16px;border-radius:16px;background:#fff8dc;border:1px solid rgba(215,173,85,.35);margin-bottom:9px}
.bs-t{font-size:1rem;font-weight:950;color:var(--FD);margin-bottom:5px}
.bs-c{font-size:.93rem;line-height:1.65;color:#4a3e1f;font-weight:700}

/* 질문 */
.qs{display:grid;gap:8px}
.qi{padding:12px 14px;border-radius:14px;background:#f0f9ff;border:1px solid rgba(12,74,110,.15);font-size:.97rem;font-weight:800;line-height:1.55;color:#0c4a6e}
.qi::before{content:"Q. ";opacity:.6}

/* 스텝 */
.steps{display:grid;gap:10px}
.step{display:flex;gap:13px;align-items:flex-start;padding:14px;border-radius:16px;background:#f8fafc;border:1px solid var(--LN)}
.step-n{width:32px;height:32px;border-radius:50%;background:var(--FD);color:#fff8dc;font-size:.9rem;font-weight:950;display:grid;place-items:center;flex-shrink:0}
.step-t{font-size:1rem;font-weight:950;color:var(--FD);margin-bottom:3px}
.step-d{font-size:.92rem;line-height:1.6;color:var(--MU);font-weight:700}

/* 법적 고지 */
.notice{padding:16px 18px;border-radius:20px;background:#f8fafc;border:1px solid #dbe3ee;color:var(--MU);font-size:.88rem;line-height:1.7;font-weight:700;margin-bottom:16px}

/* 버튼 */
.bg{border:0;background:linear-gradient(135deg,#f5dc8a,#c99938);color:#1c221c;border-radius:18px;padding:15px 22px;font-weight:950;box-shadow:0 12px 28px rgba(0,0,0,.22);cursor:pointer;min-height:54px;width:100%;font-size:1.05rem;touch-action:manipulation;margin-bottom:9px}
.bw{border:1px solid rgba(14,53,41,.2);background:#fff;color:var(--MU);border-radius:18px;padding:14px 18px;font-weight:900;cursor:pointer;min-height:54px;width:100%;font-size:1.05rem;touch-action:manipulation}

/* 로딩 */
.loading{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--MU)}
.spin{width:44px;height:44px;border:3px solid rgba(14,53,41,.1);border-top-color:var(--G);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loading p{font-weight:800;font-size:1rem;color:var(--FD)}
.loading small{font-size:.9rem;color:var(--MU)}

/* 에러 */
.err{min-height:40vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:32px 16px}
.err-t{font-size:1.2rem;font-weight:950;color:var(--FD)}
.err-d{color:var(--MU);font-weight:700;line-height:1.7}

@media print{.bg,.bw{display:none}}
</style>
</head>
<body>
<div id="Loading" class="w">
  <div class="loading">
    <div class="spin"></div>
    <p>유료 상세리포트를 생성하고 있습니다</p>
    <small>약 2~3분 소요됩니다. 잠시만 기다려주세요.</small>
  </div>
</div>
<div id="Err" class="w dn">
  <div class="err">
    <p class="err-t">리포트를 불러올 수 없습니다</p>
    <p class="err-d" id="ErrMsg">잠시 후 다시 시도해주세요.</p>
    <div style="width:100%;max-width:400px;margin-top:16px">
      <button class="bw" onclick="history.back()">이전으로 돌아가기</button>
    </div>
  </div>
</div>
<div id="Report" class="dn"></div>

<script>
function ge(id){return document.getElementById(id)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function arr(v){return Array.isArray(v)?v:typeof v==='string'&&v.trim()?[v]:[]}
function goExpert(){ location.href='/request-help.html'; }

function showErr(msg){
  ge('Loading').classList.add('dn');
  ge('ErrMsg').textContent=msg||'잠시 후 다시 시도해주세요.';
  ge('Err').classList.remove('dn');
}

function render(d, orderId){
  var s=d.sections||{};
  var h='';

  /* 헤더 */
  h+='<header class="hdr"><div class="w">'
    +'<div class="badge">안심상속 유료 상세리포트</div>'
    +'<h1>'+esc(d.title||'유료 상세리포트')+'</h1>'
    +'<p>'+esc(d.subtitle||'내 상황에 맞춰 정리한 상속 준비 자료')+'</p>'
    +'<div class="chips">'
    +'<span class="chip">진단 점수 '+esc(String(d.score||0))+'점</span>'
    +'<span class="chip">'+esc(d.level||'')+'</span>'
    +arr(d.matchedTypes).map(function(t){return'<span class="chip">'+esc(t)+'</span>'}).join('')
    +'</div></div></header>';

  h+='<div class="body"><div class="w">';

  /* 1. 요약 */
  if(s.summary){
    h+='<div class="sec"><div class="sec-ey">01 내 상황 요약</div>'
      +'<h2 class="sec-t">'+esc(s.summary.title||'내 상황 요약')+'</h2>'
      +(s.summary.lead?'<p class="sec-d">'+esc(s.summary.lead)+'</p>':'')
      +'<div class="pts">'+arr(s.summary.points).map(function(p){return'<div class="pt">'+esc(p)+'</div>'}).join('')+'</div>'
      +'</div>';
  }

  /* 1.5. 시뮬레이션 (심화설문 완료 시에만 존재) */
  if(s.simulation){
    h+='<div class="sec" style="background:#fff8dc;border-color:rgba(184,134,11,.3)"><div class="sec-ey" style="background:#92400e">심화 분석 · 구간 추정</div>'
      +'<h2 class="sec-t">'+esc(s.simulation.title||'내가 원하는 대로 남길 수 있는지 시뮬레이션')+'</h2>'
      +(s.simulation.disclaimer?'<p class="sec-d" style="font-style:italic">'+esc(s.simulation.disclaimer)+'</p>':'')
      +(s.simulation.asset_summary?'<div class="pt" style="margin-bottom:8px"><strong>재산 현황</strong><br>'+esc(s.simulation.asset_summary)+'</div>':'')
      +(s.simulation.legal_share?'<div class="pt" style="margin-bottom:8px"><strong>법정상속분 (협의·유언이 없을 때 적용되는 기본값)</strong><br>'+esc(s.simulation.legal_share)+'</div>':'')
      +(s.simulation.forced_share_check?'<div class="pt" style="margin-bottom:8px;padding:12px;border-radius:10px;background:rgba(184,134,11,.1);border:1px solid rgba(184,134,11,.25)"><strong>⚖️ 유류분 점검 — 내 뜻대로 남길 수 있는지</strong><br>'+esc(s.simulation.forced_share_check)+'</div>':'')
      +(s.simulation.tax_note?'<p class="pt" style="font-size:.85rem;opacity:.7;margin-top:6px">참고(상속세): '+esc(s.simulation.tax_note)+'</p>':'')
      +'</div>';
  }

  /* 2. 사람 관계 */
  if(s.persons){
    h+='<div class="sec"><div class="sec-ey">02 사람 관계</div>'
      +'<h2 class="sec-t">'+esc(s.persons.title||'확인할 사람 관계')+'</h2>'
      +(s.persons.description?'<p class="sec-d">'+esc(s.persons.description)+'</p>':'')
      +'<div class="cks">'+arr(s.persons.checklist).map(function(c){return'<div class="ck">'+esc(c)+'</div>'}).join('')+'</div>'
      +'</div>';
  }

  /* 3. 재산·채무 */
  if(s.assets){
    h+='<div class="sec"><div class="sec-ey">03 재산과 채무</div>'
      +'<h2 class="sec-t">'+esc(s.assets.title||'확인할 재산과 채무')+'</h2>'
      +(s.assets.description?'<p class="sec-d">'+esc(s.assets.description)+'</p>':'')
      +'<div class="cks">'+arr(s.assets.checklist).map(function(c){return'<div class="ck">'+esc(c)+'</div>'}).join('')+'</div>'
      +'</div>';
  }

  /* 4. 서류 */
  if(s.documents){
    h+='<div class="sec"><div class="sec-ey">04 준비할 자료</div>'
      +'<h2 class="sec-t">'+esc(s.documents.title||'준비하면 좋은 자료')+'</h2>'
      +(s.documents.description?'<p class="sec-d">'+esc(s.documents.description)+'</p>':'');
    if(arr(s.documents.basic).length){
      h+='<div class="dg"><div class="dg-l">기본 서류</div>'
        +'<div class="cks">'+arr(s.documents.basic).map(function(c){return'<div class="ck">'+esc(c)+'</div>'}).join('')+'</div></div>';
    }
    if(arr(s.documents.situation_specific).length){
      h+='<div class="dg"><div class="dg-l">내 상황에 따른 추가 서류</div>'
        +'<div class="cks">'+arr(s.documents.situation_specific).map(function(c){return'<div class="ck">'+esc(c)+'</div>'}).join('')+'</div></div>';
    }
    h+='</div>';
  }

  /* 5. 놓치기 쉬운 항목 */
  if(s.blind_spots){
    h+='<div class="sec"><div class="sec-ey">05 놓치기 쉬운 항목</div>'
      +'<h2 class="sec-t">'+esc(s.blind_spots.title||'놓치기 쉬운 항목')+'</h2>'
      +(s.blind_spots.description?'<p class="sec-d">'+esc(s.blind_spots.description)+'</p>':'')
      +arr(s.blind_spots.items).map(function(i){
        return'<div class="bs"><div class="bs-t">'+esc(i.title||'')+'</div><div class="bs-c">'+esc(i.content||'')+'</div></div>';
      }).join('')+'</div>';
  }

  /* 6. 질문 */
  if(s.questions){
    h+='<div class="sec"><div class="sec-ey">06 상담 전 질문</div>'
      +'<h2 class="sec-t">'+esc(s.questions.title||'상담 전 정리할 질문')+'</h2>'
      +(s.questions.description?'<p class="sec-d">'+esc(s.questions.description)+'</p>':'')
      +'<div class="qs">'+arr(s.questions.questions).map(function(q){return'<div class="qi">'+esc(q)+'</div>'}).join('')+'</div>'
      +'</div>';
  }

  /* 7. 다음 순서 */
  if(s.next_steps){
    h+='<div class="sec"><div class="sec-ey">07 다음 순서</div>'
      +'<h2 class="sec-t">'+esc(s.next_steps.title||'다음에 확인할 순서')+'</h2>'
      +(s.next_steps.description?'<p class="sec-d">'+esc(s.next_steps.description)+'</p>':'')
      +'<div class="steps">'+arr(s.next_steps.steps).map(function(st){
        return'<div class="step"><div class="step-n">'+esc(String(st.order||''))+'</div>'
          +'<div><div class="step-t">'+esc(st.title||'')+'</div><div class="step-d">'+esc(st.content||'')+'</div></div></div>';
      }).join('')+'</div></div>';
  }

  /* 법적 고지·버튼 */
  h+='<div class="notice">'+esc(d.legal_notice||'2026년 최신 법령을 기준으로 작성되었습니다. 실제 진행 시 전문가와 함께 확인하세요.')+'</div>';

  if(orderId){
    var saveUrl = location.origin + '/my-report.html?order=' + encodeURIComponent(orderId);
    h+='<div class="sec" style="background:#f7faf7;border:2px solid rgba(31,77,58,.2);text-align:center">'
      +'<h2 class="sec-t" style="margin-bottom:6px">이 리포트, 30일간 언제든 다시 볼 수 있습니다</h2>'
      +'<p class="sec-d" style="margin-bottom:10px">아래 링크를 북마크해두시면 결제일로부터 30일간 이 리포트를 다시 받아보실 수 있습니다.</p>'
      +'<a href="'+esc(saveUrl)+'" style="display:block;word-break:break-all;color:var(--FD);font-weight:950;text-decoration:underline;font-size:.92rem">'+esc(saveUrl)+'</a>'
      +'</div>';
  }

  h+='<div class="sec" style="background:#fff7e7;border:2px solid rgba(215,173,85,.4);text-align:center">'
    +'<h2 class="sec-t" style="margin-bottom:6px">변호사·세무사에게 직접 견적을 받아보세요</h2>'
    +'<p class="sec-d" style="margin-bottom:14px">상황을 한 번만 적으면 여러 전문가가 상담료와 일정을 제안합니다. 비교 후 직접 선택하시면 됩니다.</p>'
    +'<button class="bg" onclick="goExpert()" style="margin-bottom:0">전문가 견적 요청하기</button>'
    +'</div>'
    +'<button class="bw" onclick="window.print()" style="margin-bottom:9px;margin-top:9px">리포트 저장 (인쇄·PDF)</button>'
    +'<button class="bw" onclick="location.href=\'/\'">처음으로 돌아가기</button>';

  h+='</div></div>';

  try{ sessionStorage.setItem('ansim_matched_types', JSON.stringify(arr(d.matchedTypes))); }catch(e){}

  var R=ge('Report');
  R.innerHTML=h;
  ge('Loading').classList.add('dn');
  R.classList.remove('dn');
}

async function run(){
  var raw=null;
  try{raw=sessionStorage.getItem('ansim_report_request')}catch(e){}

  /* 모바일에서 탭이 kill된 후 돌아온 경우 localStorage 백업에서 복구 */
  if(!raw){
    try{raw=localStorage.getItem('ansim_report_request_backup')}catch(e){}
    if(raw){
      try{sessionStorage.setItem('ansim_report_request',raw)}catch(e){}
    }
  }

  if(!raw){showErr('진단 결과 데이터가 없습니다. 무료 진단을 먼저 완료해주세요.');return}
  var req;
  try{req=JSON.parse(raw)}catch(e){showErr('데이터 오류가 발생했습니다. 다시 시도해주세요.');return}

  /* Wake Lock: 리포트 생성 중 화면이 꺼지거나 기기가 잠기는 것을 방지 */
  var wakeLock=null;
  try{
    if(navigator.wakeLock) wakeLock=await navigator.wakeLock.request('screen');
  }catch(e){}

  try{
    var res=await fetch('/api/generate-report',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(req)
    });
    var data=await res.json().catch(function(){return{}});
    if(!res.ok||!data.ok)throw new Error(data.message||'리포트 생성 실패');
    /* 성공 시 localStorage 백업 정리 */
    try{localStorage.removeItem('ansim_report_request_backup')}catch(e){}
    try{localStorage.removeItem('ansim_pending_order')}catch(e){}
    try{sessionStorage.removeItem('ansim_report_request')}catch(e){}
    if(wakeLock){try{wakeLock.release()}catch(e){}}
    render(data.report, req.orderId);
  }catch(e){
    if(wakeLock){try{wakeLock.release()}catch(e){}}
    showErr(e.message||'리포트 생성 중 문제가 발생했습니다.')
  }
}

run();
</script>
</body>
</html>
