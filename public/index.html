  /* ?? ?좏떥 ?? */
  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  var toastTimer;
  function showToast(msg, type) {

  /* ?? ?먯닔 怨꾩궛 ?? */
  function getQuestionScore(q) {
    var ans = state.answers[q.key];
    if (!ans) return 0;
    if (q.type === 'single') {
      var o = q.options.find(function(x) { return x.label === ans; });
      return o ? o.score : 0;
    }
    if (q.type === 'multiSimple') {
      if (!Array.isArray(ans)) return 0;
      return ans.reduce(function(sum, v) {
        var o = q.options.find(function(x) { return x.value === v; });
        return sum + (o ? o.score : 0);
      }, 0);
    }
    if (q.type === 'assetCounts') {
      var presence = Array.isArray(state.answers[q.presenceKey])
        ? state.answers[q.presenceKey].filter(function(k) { return k !== 'none' && k !== 'unknown'; }) : [];
      if (!presence.length) return 0;
      return q.assets.filter(function(a) { return presence.indexOf(a.key) !== -1; })
        .reduce(function(sum, a) {
          var lbl = ans[a.key];
          var idx = a.labels.indexOf(lbl);
          return sum + (idx >= 0 ? a.scores[idx] : 0);
        }, 0);
    }
    return 0;
  }
  function getTotalScore() {
    return Math.min(100, QUESTIONS.reduce(function(sum, q) { return sum + getQuestionScore(q); }, 0));
  }
  window.getTotalScore = getTotalScore;

  /* ?? ?ㅻ깄???? */

      var sel = Array.isArray(state.answers[q.key]) ? state.answers[q.key] : [];

          + '<span class="opt-check">???좏깮??/span>'

  function bindOptionClicks() {
    var btns = optionsArea.querySelectorAll('.opt-btn');
    for (var i = 0; i < btns.length; i++) {
      (function(btn) {
        btn.addEventListener('click', function() { handleOptionClick(btn); }, false);
      })(btns[i]);
    }
  }

  function handleOptionClick(btn) {
    var q   = QUESTIONS[state.step];
    var v   = btn.getAttribute('data-value');
    var ak  = btn.getAttribute('data-asset');

    if (q.type === 'single') {
      state.answers[q.key] = v;
      var all = optionsArea.querySelectorAll('.opt-btn');
      for (var i = 0; i < all.length; i++) all[i].classList.remove('selected');
      btn.classList.add('selected');

    } else if (q.type === 'assetCounts') {
      if (!ak) return;
      if (!state.answers[q.key]) state.answers[q.key] = {};
      state.answers[q.key][ak] = v;
      var group = optionsArea.querySelectorAll('.opt-btn[data-asset="' + ak + '"]');
      for (var j = 0; j < group.length; j++) group[j].classList.remove('selected');
      btn.classList.add('selected');

    } else if (q.type === 'multiSimple') {
      var excl = q.exclusive || [];
      var sel  = Array.isArray(state.answers[q.key]) ? state.answers[q.key].slice() : [];
      var on   = sel.indexOf(v) !== -1;
      if (excl.indexOf(v) !== -1) {
        sel = on ? [] : [v];
      } else if (on) {
        sel = sel.filter(function(x) { return x !== v; });
      } else {
        sel = sel.filter(function(x) { return excl.indexOf(x) === -1; });
        sel.push(v);
      }
      state.answers[q.key] = sel;
      var all2 = optionsArea.querySelectorAll('.opt-btn');
      for (var m = 0; m < all2.length; m++) {
        if (sel.indexOf(all2[m].getAttribute('data-value')) !== -1) {
          all2[m].classList.add('selected');
        } else {
          all2[m].classList.remove('selected');
        }
      }
    }
    syncSnapshot();
    trackFunnel('option_select', { step: state.step + 1, key: q.key });
  }

  async function handleSubmit() {
    var nameEl    = $('leadName');
    var emailEl   = $('leadEmail');
    var memoEl    = $('leadMemo');
    var consentEl = $('privacyConsent');
    var statusEl  = $('saveStatus');
    var btn       = $('submitBtn');

    if (!nameEl || !emailEl || !statusEl || !btn) return;

    statusEl.className = 'save-status';
    statusEl.textContent = '';

    var name  = nameEl.value.trim();
    var email = emailEl.value.trim();

    if (!name) {
      statusEl.textContent = '?깊븿???낅젰?댁＜?몄슂.';
      statusEl.className = 'save-status error';
      statusEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }
    if (!email || !email.includes('@')) {
      statusEl.textContent = '?대찓?쇱쓣 ?뺥솗???낅젰?댁＜?몄슂.';
      statusEl.className = 'save-status error';
      statusEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }
    if (consentEl && !consentEl.checked) {
      statusEl.textContent = '媛쒖씤?뺣낫 ?섏쭛쨌?댁슜 ?숈쓽瑜?泥댄겕?댁＜?몄슂.';
      statusEl.className = 'save-status error';
      statusEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }

    var score = getTotalScore();
    var payload = {
      name:  name,
      email: email,
      memo:  memoEl ? memoEl.value.trim() : '',
      answers: state.answers,
      score:   score,
      freeReport: buildFreeReportData(score),
      paidReportPreview: buildPaidReportPreview(score),
      paidReportIntent: window.__ansimPaidReportIntent || null,
      reportRequestedAt: new Date().toISOString()
    };

    btn.disabled = true;
    btn.textContent = '?묒닔 以묒엯?덈떎...';
    statusEl.textContent = '?좊즺 ?곸꽭由ы룷???덈궡 ?좎껌???묒닔?섍퀬 ?덉뒿?덈떎.';
    statusEl.className = 'save-status success';
    statusEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
    showToast('?좊즺 ?곸꽭由ы룷???덈궡 ?좎껌???묒닔?섍퀬 ?덉뒿?덈떎.');
    trackFunnel('report_form_submit_click', { score: score });

    try {
      var res = await fetch('/api/leads', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      var data = await res.json().catch(function() { return {}; });
      if (!res.ok || !data.ok) throw new Error(data.message || '?좎껌 ?묒닔 ?ㅽ뙣');

      statusEl.textContent = '?좎껌???묒닔?섏뿀?듬땲?? ?낅젰?섏떊 ?대찓?쇰줈 由ы룷???뺤씤 ?덉감瑜?蹂대궡?쒕┰?덈떎.';
      statusEl.className = 'save-status success';
      showToast('?좎껌???묒닔?섏뿀?듬땲?? ?대찓?쇱쓣 ?뺤씤?댁＜?몄슂.');
      if (nameEl) nameEl.value = '';
      if (emailEl) emailEl.value = '';
      if (memoEl) memoEl.value = '';
      trackFunnel('report_form_submit_success', { score: score });
    } catch (err) {
      statusEl.textContent = '?좎떆 ???ㅼ떆 ?좎껌??二쇱꽭?? ?낅젰?섏떊 ?댁슜? ?몃???怨듦컻?섏? ?딆뒿?덈떎.';

      showToast('?좎떆 ???ㅼ떆 ?좎껌??二쇱꽭??', 'error');

      btn.textContent = '?곸꽭由ы룷???덈궡 諛쏄린';
      statusEl.scrollIntoView({ behavior: 'smooth', block: 'center' });

  /* ?? ?쇰꼸 ?몃옒???? */
  function trackFunnel(name, detail) {
    var payload = Object.assign({ event: name, path: location.pathname, ts: new Date().toISOString() }, detail || {});
    try {
      var key = 'ansimsangsokFunnelEvents';
      var prev = JSON.parse(localStorage.getItem(key) || '[]');
      prev.push(payload);
      localStorage.setItem(key, JSON.stringify(prev.slice(-200)));
    } catch(e) {}
    if (typeof window.gtag === 'function') window.gtag('event', name, payload);
    if (Array.isArray(window.dataLayer)) window.dataLayer.push(payload);
    window.dispatchEvent(new CustomEvent('ansimsangsok:funnel', { detail: payload }));
  }
  window.ansimTrackFunnel = trackFunnel;
