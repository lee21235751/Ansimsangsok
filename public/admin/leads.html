<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>안심상속 리드 관리</title>
  <style>
    :root {
      --bg: #f7f4ec;
      --card: #fffaf0;
      --text: #2c2418;
      --muted: #756b5c;
      --line: #e5dcc9;
      --accent: #8a6a2f;
      --accent-dark: #5f471e;
      --danger: #9b2f2f;
      --good: #2f6b45;
      --hold: #6c5c2f;
      --shadow: 0 10px 28px rgba(75, 55, 25, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    .wrap {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 36px;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 4vw, 32px);
      line-height: 1.15;
      letter-spacing: -0.04em;
    }

    .sub {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 14px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1.4fr 0.9fr 0.9fr auto;
      gap: 10px;
      align-items: end;
    }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 5px;
      font-weight: 700;
    }

    input, select, button {
      width: 100%;
      font: inherit;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fffdf8;
      color: var(--text);
      padding: 10px 11px;
    }

    button {
      cursor: pointer;
      border: 0;
      background: var(--accent);
      color: white;
      font-weight: 800;
    }

    button:hover { background: var(--accent-dark); }

    button.secondary {
      background: #efe5d1;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .statusbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .pill {
      display: inline-flex;
      padding: 4px 8px;
      border-radius: 999px;
      background: #efe5d1;
      border: 1px solid var(--line);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .pill.new { color: var(--danger); }
    .pill.payment_guided, .pill.guided, .pill.interested { color: var(--accent-dark); }
    .pill.paid { color: var(--good); }
    .pill.hold, .pill.declined { color: var(--hold); }

    .grid { display: grid; gap: 12px; }

    .lead {
      display: grid;
      gap: 12px;
      background: #fffdf8;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
    }

    .leadTop {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
    }

    .name {
      font-weight: 900;
      font-size: 17px;
      letter-spacing: -0.03em;
    }

    .meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 3px;
      word-break: break-word;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
    }

    .detail {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
    }

    .detailBox {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 9px;
      background: #fffaf0;
      min-height: 52px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1.3fr auto;
      gap: 8px;
      align-items: end;
    }

    .copyActions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .copyActions button {
      width: auto;
      padding: 8px 10px;
      border-radius: 999px;
      background: #fffdf8;
      color: var(--accent-dark);
      border: 1px solid var(--line);
      font-size: 13px;
    }

    .copyActions button:hover {
      border-color: var(--accent);
    }

    .oneClickActions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .oneClickActions button {
      width: auto;
      padding: 9px 11px;
      border-radius: 999px;
      background: var(--accent-dark);
      color: white;
      border: 1px solid var(--accent-dark);
      font-size: 13px;
      font-weight: 700;
    }

    .oneClickActions button.hold {
      background: #6c5c2f;
      border-color: #6c5c2f;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 28px 12px;
      border: 1px dashed var(--line);
      border-radius: 16px;
      background: #fffdf8;
    }

    .error { color: var(--danger); font-weight: 800; }
    .ok { color: var(--good); font-weight: 800; }
    .small { font-size: 12px; color: var(--muted); }

    .quickFilters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .quickFilters button {
      width: auto;
      padding: 8px 10px;
      border-radius: 999px;
      background: #efe5d1;
      color: var(--text);
      border: 1px solid var(--line);
      font-size: 13px;
    }

    .quickFilters button.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    @media (max-width: 820px) {
      .toolbar, .actions, .detail { grid-template-columns: 1fr; }
      header { display: block; }
      .badges { justify-content: flex-start; }
      .leadTop { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <div>
        <h1>리드 관리</h1>
        <p class="sub">무료진단 이후 들어온 리드를 확인하고, 후속상태와 리포트 안내 상태를 정리합니다.</p>
      </div>
      <button class="secondary" type="button" id="clearTokenButton">토큰 지우기</button>
    </header>

    <section class="card">
      <div class="toolbar">
        <div>
          <label for="adminToken">관리자 토큰</label>
          <input id="adminToken" type="password" autocomplete="off" placeholder="ADMIN_LEAD_UPDATE_TOKEN" />
        </div>

        <div>
          <label for="followupFilter">후속상태</label>
          <select id="followupFilter">
            <option value="">전체</option>
            <option value="new">새 리드</option>
            <option value="contacted">연락함</option>
            <option value="payment_guided">결제 안내</option>
            <option value="hold">보류</option>
            <option value="test">테스트</option>
          </select>
        </div>

        <div>
          <label for="paidFilter">리포트상태</label>
          <select id="paidFilter">
            <option value="">전체</option>
            <option value="none">없음</option>
            <option value="guided">안내함</option>
            <option value="interested">관심 있음</option>
            <option value="paid">구매 완료</option>
            <option value="declined">거절</option>
          </select>
        </div>

        <div>
          <label>&nbsp;</label>
          <button type="button" id="loadButton">불러오기</button>
        </div>
      </div>

      <div class="statusbar">
        <span id="statusText">토큰을 입력한 뒤 리드를 불러오세요.</span>
        <span class="small">토큰은 이 브라우저 세션에만 보관됩니다.</span>
      </div>

      <div class="quickFilters" aria-label="빠른 필터">
        <button type="button" data-followup="new" data-paid="">새 리드</button>
        <button type="button" data-followup="payment_guided" data-paid="">결제 안내 대상</button>
        <button type="button" data-followup="" data-paid="interested">리포트 관심</button>
        <button type="button" data-followup="" data-paid="paid">구매 완료</button>
        <button type="button" data-followup="hold" data-paid="">보류</button>
        <button type="button" data-followup="test" data-paid="">테스트</button>
        <button type="button" data-followup="" data-paid="">전체</button>
      </div>
    </section>

    <section class="grid" id="leadList">
      <div class="empty">아직 불러온 리드가 없습니다.</div>
    </section>
  </main>

  <script>
    var FOLLOWUP_LABELS = {
      new: "새 리드",
      contacted: "연락함",
      payment_guided: "결제 안내",
      hold: "보류",
      test: "테스트"
    };

    var PAID_LABELS = {
      none: "없음",
      guided: "안내함",
      interested: "관심 있음",
      paid: "구매 완료",
      declined: "거절"
    };

    var adminTokenInput = document.getElementById("adminToken");
    var followupFilter = document.getElementById("followupFilter");
    var paidFilter = document.getElementById("paidFilter");
    var loadButton = document.getElementById("loadButton");
    var clearTokenButton = document.getElementById("clearTokenButton");
    var statusText = document.getElementById("statusText");
    var leadList = document.getElementById("leadList");
    var quickFilterButtons = document.querySelectorAll(".quickFilters button");

    var savedToken = sessionStorage.getItem("ansimsangsok_admin_token");
    if (savedToken) {
      adminTokenInput.value = savedToken;
    }

    function setStatus(message, type) {
      statusText.textContent = message;
      statusText.className = type === "error" ? "error" : type === "ok" ? "ok" : "";
    }

    function escapeHtml(value) {
      return String(value == null ? "" : value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function formatDate(value) {
      if (!value) return "-";
      var date = new Date(value);
      if (Number.isNaN(date.getTime())) return "-";
      return date.toLocaleString("ko-KR", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function getToken() {
      return adminTokenInput.value.trim();
    }

    function labelOf(map, value) {
      return map[value] || value || "-";
    }

    function optionHtml(map, selectedValue) {
      var html = "";
      Object.keys(map).forEach(function(value) {
        var selected = value === selectedValue ? " selected" : "";
        html += "<option value=\"" + escapeHtml(value) + "\"" + selected + ">" + escapeHtml(map[value]) + "</option>";
      });
      return html;
    }

    async function requestJson(url, options) {
      var response = await fetch(url, options);
      var text = await response.text();
      var data = null;

      try {
        data = text ? JSON.parse(text) : null;
      } catch (error) {
        data = { raw: text };
      }

      if (!response.ok) {
        var message = data && data.error ? data.error : "request_failed";
        throw new Error(message);
      }

      return data;
    }

    function renderEmpty(message) {
      leadList.innerHTML = "<div class=\"empty\">" + escapeHtml(message) + "</div>";
    }

    function renderLeads(leads) {
      if (!Array.isArray(leads) || leads.length === 0) {
        renderEmpty("조건에 맞는 리드가 없습니다.");
        return;
      }

      var html = "";

      leads.forEach(function(lead) {
        var followupStatus = lead.followup_status || "new";
        var paidReportStatus = lead.paid_report_status || "none";

        html += ""
          + "<article class=\"lead\" data-lead-id=\"" + escapeHtml(lead.id) + "\" data-lead-name=\"" + escapeHtml(lead.name || "") + "\" data-lead-email=\"" + escapeHtml(lead.email || "") + "\">"
          + "<div class=\"leadTop\">"
          + "<div>"
          + "<div class=\"name\">" + escapeHtml(lead.name || "이름 없음") + "</div>"
          + "<div class=\"meta\">" + escapeHtml(lead.email || "이메일 없음") + "</div>"
          + "<div class=\"meta\">접수: " + escapeHtml(formatDate(lead.created_at)) + "</div>"
          + "</div>"
          + "<div class=\"badges\">"
          + "<span class=\"pill " + escapeHtml(followupStatus) + "\">" + escapeHtml(labelOf(FOLLOWUP_LABELS, followupStatus)) + "</span>"
          + "<span class=\"pill " + escapeHtml(paidReportStatus) + "\">" + escapeHtml(labelOf(PAID_LABELS, paidReportStatus)) + "</span>"
          + "</div>"
          + "</div>"

          + "<div class=\"detail\">"
          + "<div class=\"detailBox\"><strong>점수</strong><br />" + escapeHtml(lead.score == null ? "-" : lead.score) + "</div>"
          + "<div class=\"detailBox\"><strong>최근 연락</strong><br />" + escapeHtml(formatDate(lead.last_contacted_at)) + "</div>"
          + "<div class=\"detailBox\"><strong>수정</strong><br />" + escapeHtml(formatDate(lead.updated_at)) + "</div>"
          + "</div>"

          + "<div class=\"detail\">"
          + "<div class=\"detailBox\"><strong>메모</strong><br />" + escapeHtml(lead.memo || "-") + "</div>"
          + "<div class=\"detailBox\"><strong>사용자 입력</strong><br />" + escapeHtml(lead.note || "-") + "</div>"
          + "<div class=\"detailBox\"><strong>후속 메모</strong><br />" + escapeHtml(lead.followup_note || "-") + "</div>"
          + "</div>"

          + "<div class=\"actions\">"
          + "<div><label>후속상태</label><select class=\"js-followup\">" + optionHtml(FOLLOWUP_LABELS, followupStatus) + "</select></div>"
          + "<div><label>리포트상태</label><select class=\"js-paid\">" + optionHtml(PAID_LABELS, paidReportStatus) + "</select></div>"
          + "<div><label>후속 메모</label><input class=\"js-note\" type=\"text\" value=\"" + escapeHtml(lead.followup_note || "") + "\" placeholder=\"간단 메모\" /></div>"
          + "<div><label>&nbsp;</label><button type=\"button\" class=\"js-save\">저장</button></div>"
          + "</div>"

          + "<div class=\"copyActions\" aria-label=\"응대 문구 복사\">"
          + "<button type=\"button\" class=\"js-copy-reply\" data-reply=\"first\">첫 안내 복사</button>"
          + "<button type=\"button\" class=\"js-copy-reply\" data-reply=\"report\">리포트 안내 복사</button>"
          + "<button type=\"button\" class=\"js-copy-reply\" data-reply=\"payment\">결제 안내 복사</button>"
          + "<button type=\"button\" class=\"js-copy-reply\" data-reply=\"hold\">보류 안내 복사</button>"
          + "</div>"
          + "<div class=\"oneClickActions\" aria-label=\"상태 변경과 응대 문구 복사\">"
          + "<button type=\"button\" class=\"js-oneclick-reply\" data-reply=\"first\" data-followup=\"contacted\" data-paid=\"none\" data-note=\"첫 안내\">첫 안내 전환+복사</button>"
          + "<button type=\"button\" class=\"js-oneclick-reply\" data-reply=\"report\" data-followup=\"contacted\" data-paid=\"guided\" data-note=\"리포트 안내\">리포트 안내 전환+복사</button>"
          + "<button type=\"button\" class=\"js-oneclick-reply\" data-reply=\"payment\" data-followup=\"payment_guided\" data-paid=\"guided\" data-note=\"결제 안내\">결제 안내 전환+복사</button>"
          + "<button type=\"button\" class=\"js-oneclick-reply hold\" data-reply=\"hold\" data-followup=\"hold\" data-paid=\"none\" data-note=\"보류 안내\">보류 전환+복사</button>"
          + "</div>"
          + "</article>";
      });

      leadList.innerHTML = html;

      Array.prototype.forEach.call(document.querySelectorAll(".js-save"), function(button) {
        button.addEventListener("click", function(event) {
          var card = event.target.closest(".lead");
          if (card) saveLead(card);
        });
      });

      Array.prototype.forEach.call(document.querySelectorAll(".js-copy-reply"), function(button) {
        button.addEventListener("click", function(event) {
          var card = event.target.closest(".lead");
          if (card) copyReply(card, button.getAttribute("data-reply"));
        });
      });

      Array.prototype.forEach.call(document.querySelectorAll(".js-oneclick-reply"), function(button) {
        button.addEventListener("click", function(event) {
          var card = event.target.closest(".lead");
          if (card) oneClickReply(card, button);
        });
      });
    }


    function setQuickFilterActive(followupValue, paidValue) {
      Array.prototype.forEach.call(quickFilterButtons, function(button) {
        var isActive =
          button.getAttribute("data-followup") === followupValue &&
          button.getAttribute("data-paid") === paidValue;

        if (isActive) {
          button.classList.add("active");
        } else {
          button.classList.remove("active");
        }
      });
    }

    function applyQuickFilter(button) {
      followupFilter.value = button.getAttribute("data-followup") || "";
      paidFilter.value = button.getAttribute("data-paid") || "";
      setQuickFilterActive(followupFilter.value, paidFilter.value);
      loadLeads();
    }

    async function loadLeads() {
      var token = getToken();

      if (!token) {
        setStatus("관리자 토큰을 입력하세요.", "error");
        return;
      }

      sessionStorage.setItem("ansimsangsok_admin_token", token);

      var params = new URLSearchParams();
      params.set("limit", "50");

      if (followupFilter.value) {
        params.set("followupStatus", followupFilter.value);
      }

      if (paidFilter.value) {
        params.set("paidReportStatus", paidFilter.value);
      }

      setStatus("리드를 불러오는 중입니다.", "");

      try {
        var data = await requestJson("/api/admin/leads/list?" + params.toString(), {
          method: "GET",
          headers: { "x-admin-token": token }
        });

        renderLeads(data.leads);
        setStatus("리드 " + (data.count || 0) + "건을 불러왔습니다.", "ok");
      } catch (error) {
        renderEmpty("리드를 불러오지 못했습니다.");
        setStatus("불러오기 실패: " + error.message, "error");
      }
    }

    function buildReplyText(card, kind) {
      var name = card.getAttribute("data-lead-name") || "";
      var greeting = name ? name + "님, 안녕하세요. 안심상속입니다." : "안녕하세요. 안심상속입니다.";

      if (kind === "report") {
        return greeting + "\n\n상속정리 리포트는 현재 상황을 차분히 정리하고, 확인할 항목과 준비자료, 상담 전 질문을 한 번에 볼 수 있도록 정리하는 자료입니다.\n\n진행을 원하시면 안내를 이어서 도와드리겠습니다.";
      }

      if (kind === "payment") {
        return greeting + "\n\n요청하신 상속정리 리포트 진행 안내드립니다. 리포트에는 현재 상황 요약, 확인할 항목, 준비자료, 상담 전 질문 정리가 포함됩니다.\n\n진행을 원하시면 결제 안내를 보내드리겠습니다.";
      }

      if (kind === "hold") {
        return greeting + "\n\n지금 바로 진행하지 않으셔도 괜찮습니다. 필요하실 때 다시 확인하실 수 있도록 남겨주신 내용을 기준으로 안내드리겠습니다.";
      }

      return greeting + "\n\n남겨주신 내용을 확인했습니다. 안심상속은 상속 상황을 차분히 정리하고, 지금 확인할 항목과 다음 준비 방향을 이해하실 수 있도록 돕습니다.\n\n필요하시면 상속정리 리포트 안내를 이어서 도와드리겠습니다.";
    }

    async function copyTextToClipboard(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        await navigator.clipboard.writeText(text);
        return;
      }

      var textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "readonly");
      textarea.style.position = "fixed";
      textarea.style.left = "-9999px";
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      document.body.removeChild(textarea);
    }

    function appendFollowupNote(card, noteLabel) {
      var noteInput = card.querySelector(".js-note");
      if (!noteInput) return;

      var stamp = new Date().toLocaleString("ko-KR");
      var addition = noteLabel + " / " + stamp;
      var current = noteInput.value.trim();
      noteInput.value = current ? current + " | " + addition : addition;
    }

    async function oneClickReply(card, button) {
      var followupStatus = button.getAttribute("data-followup") || "contacted";
      var paidReportStatus = button.getAttribute("data-paid") || "none";
      var replyKind = button.getAttribute("data-reply") || "first";
      var noteLabel = button.getAttribute("data-note") || "응대";
      var followupSelect = card.querySelector(".js-followup");
      var paidSelect = card.querySelector(".js-paid");

      if (followupSelect) followupSelect.value = followupStatus;
      if (paidSelect) paidSelect.value = paidReportStatus;
      appendFollowupNote(card, noteLabel);

      try {
        await copyTextToClipboard(buildReplyText(card, replyKind));
        setStatus("응대 문구를 복사하고 상태를 저장하는 중입니다.", "");
      } catch (error) {
        setStatus("복사는 실패했지만 상태 저장을 시도합니다.", "error");
      }

      await saveLead(card);
    }

    async function copyReply(card, kind) {
      try {
        await copyTextToClipboard(buildReplyText(card, kind));
        setStatus("응대 문구를 복사했습니다.", "ok");
      } catch (error) {
        setStatus("복사 실패: 직접 선택해서 복사해 주세요.", "error");
      }
    }

    async function saveLead(card) {
      var token = getToken();

      if (!token) {
        setStatus("관리자 토큰을 입력하세요.", "error");
        return;
      }

      var leadId = card.getAttribute("data-lead-id");
      var followupStatus = card.querySelector(".js-followup").value;
      var paidReportStatus = card.querySelector(".js-paid").value;
      var followupNote = card.querySelector(".js-note").value.trim();

      setStatus("상태를 저장하는 중입니다.", "");

      try {
        await requestJson("/api/admin/leads/update-status", {
          method: "POST",
          headers: {
            "Content-Type": "application/json; charset=utf-8",
            "x-admin-token": token
          },
          body: JSON.stringify({
            leadId: leadId,
            followupStatus: followupStatus,
            paidReportStatus: paidReportStatus,
            followupNote: followupNote
          })
        });

        setStatus("저장했습니다.", "ok");
        await loadLeads();
      } catch (error) {
        setStatus("저장 실패: " + error.message, "error");
      }
    }

    Array.prototype.forEach.call(quickFilterButtons, function(button) {
      button.addEventListener("click", function() {
        applyQuickFilter(button);
      });
    });

    followupFilter.addEventListener("change", function() {
      setQuickFilterActive(followupFilter.value, paidFilter.value);
    });

    paidFilter.addEventListener("change", function() {
      setQuickFilterActive(followupFilter.value, paidFilter.value);
    });

    setQuickFilterActive(followupFilter.value, paidFilter.value);

    loadButton.addEventListener("click", loadLeads);

    clearTokenButton.addEventListener("click", function() {
      sessionStorage.removeItem("ansimsangsok_admin_token");
      adminTokenInput.value = "";
      setStatus("토큰을 지웠습니다.", "");
      renderEmpty("토큰을 입력한 뒤 리드를 불러오세요.");
    });
  </script>
</body>
</html>
