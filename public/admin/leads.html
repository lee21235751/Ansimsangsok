<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="robots" content="noindex,nofollow"/>
<title>안심상속 리드 관리</title>
<style>
*{box-sizing:border-box;margin:0}
body{background:#f7f4ec;color:#2c2418;font-family:system-ui,-apple-system,sans-serif;line-height:1.5}
.wrap{width:min(1120px,calc(100% - 28px));margin:0 auto;padding:22px 0 40px}
h1{font-size:clamp(20px,4vw,30px);letter-spacing:-.04em;margin-bottom:4px}
.sub{color:#756b5c;font-size:14px;margin-bottom:16px}
.card{background:#fffaf0;border:1px solid #e5dcc9;border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 10px 28px rgba(75,55,25,.08)}
.tb{display:grid;grid-template-columns:1.4fr .9fr .9fr auto;gap:10px;align-items:end}
@media(max-width:600px){.tb{grid-template-columns:1fr 1fr}}
label{display:block;font-size:12px;color:#756b5c;margin-bottom:5px;font-weight:600}
input,select,textarea{width:100%;padding:9px 11px;border:1.5px solid #e5dcc9;border-radius:10px;background:#fff;color:#2c2418;font:inherit;font-size:14px}
input:focus,select:focus{outline:2px solid #8a6a2f;border-color:#8a6a2f}
.btn{padding:9px 15px;border:0;border-radius:10px;font:inherit;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;min-height:38px}
.btn-p{background:#8a6a2f;color:#fff}
.btn-s{background:#e5dcc9;color:#5f471e}
.btn-sm{padding:6px 10px;font-size:12px;border-radius:8px}
.qf{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.qf-btn{padding:6px 12px;border:1.5px solid #e5dcc9;border-radius:999px;background:#fff;color:#756b5c;font-size:13px;font-weight:700;cursor:pointer}
.qf-btn.on{background:#8a6a2f;color:#fff;border-color:#8a6a2f}
.stat{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:8px;margin-bottom:14px}
.stat-item{background:#fffaf0;border:1px solid #e5dcc9;border-radius:14px;padding:12px;text-align:center}
.stat-n{font-size:22px;font-weight:900;color:#5f471e}
.stat-l{font-size:12px;color:#756b5c;font-weight:600}
.sbar{padding:10px 14px;border-radius:10px;background:#fff;border:1px solid #e5dcc9;color:#756b5c;font-size:13px;margin-bottom:10px}
.sbar.ok{background:#eef7f1;border-color:#2f6b45;color:#2f6b45}
.sbar.er{background:#fdf0f0;border-color:#9b2f2f;color:#9b2f2f}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f0e8d8;padding:8px 10px;text-align:left;font-weight:700;border-bottom:1.5px solid #e5dcc9;white-space:nowrap}
td{padding:9px 10px;border-bottom:1px solid #e5dcc9;vertical-align:top}
tr:hover td{background:#fdf8f0}
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:800}
.b-new{background:#dbeafe;color:#1e3a5f}
.b-contacted{background:#d1fae5;color:#065f46}
.b-payment_guided{background:#fef3c7;color:#92400e}
.b-hold{background:#f3f4f6;color:#374151}
.b-test{background:#fce7f3;color:#9d174d}
.b-paid{background:#d1fae5;color:#065f46}
.b-none{background:#f3f4f6;color:#6b7280}
.b-guided{background:#dbeafe;color:#1e3a5f}
.b-interested{background:#fef3c7;color:#92400e}
.b-declined{background:#fce7f3;color:#9d174d}
.note-pre{font-size:12px;color:#756b5c;white-space:pre-wrap;max-height:80px;overflow-y:auto;background:#fdf8f0;padding:6px 8px;border-radius:8px;margin-top:4px}
.actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
select.sel-s{width:auto;padding:5px 8px;font-size:12px}
.empty{text-align:center;padding:40px;color:#756b5c;font-size:15px}
.test-tag{display:inline-block;background:#fce7f3;color:#9d174d;font-size:10px;font-weight:800;padding:1px 6px;border-radius:4px;margin-left:4px;vertical-align:middle}
</style>
</head>
<body>
<div class="wrap">
  <h1>안심상속 리드 관리</h1>
  <p class="sub">신규 리드 확인 및 후속 관리</p>

  <div class="card">
    <div class="tb">
      <div><label>관리자 토큰</label><input id="tkn" type="password" placeholder="ADMIN_LEAD_UPDATE_TOKEN" autocomplete="off"/></div>
      <div><label>후속 상태</label>
        <select id="fStatus">
          <option value="">전체</option>
          <option value="new">신규</option>
          <option value="contacted">연락 완료</option>
          <option value="payment_guided">결제 안내</option>
          <option value="hold">보류</option>
          <option value="test">테스트</option>
        </select>
      </div>
      <div><label>리포트 상태</label>
        <select id="fPaid">
          <option value="">전체</option>
          <option value="none">미안내</option>
          <option value="guided">안내 완료</option>
          <option value="interested">관심</option>
          <option value="paid">결제 완료</option>
          <option value="declined">거절</option>
        </select>
      </div>
      <div style="display:flex;gap:8px;align-items:flex-end">
        <button class="btn btn-p" onclick="load()">불러오기</button>
        <button class="btn btn-s" onclick="reset()">초기화</button>
      </div>
    </div>
    <div class="qf">
      <button class="qf-btn" data-f="" data-p="">전체</button>
      <button class="qf-btn" data-f="new" data-p="">신규</button>
      <button class="qf-btn" data-f="contacted" data-p="">연락 완료</button>
      <button class="qf-btn" data-f="payment_guided" data-p="">결제 안내</button>
      <button class="qf-btn" data-f="" data-p="paid">결제 완료</button>
      <button class="qf-btn" data-f="hold" data-p="">보류</button>
    </div>
  </div>

  <div class="stat" id="Stat" style="display:none">
    <div class="stat-item"><div class="stat-n" id="sTotal">0</div><div class="stat-l">전체</div></div>
    <div class="stat-item"><div class="stat-n" id="sNew">0</div><div class="stat-l">신규</div></div>
    <div class="stat-item"><div class="stat-n" id="sContacted">0</div><div class="stat-l">연락 완료</div></div>
    <div class="stat-item"><div class="stat-n" id="sPayment">0</div><div class="stat-l">결제 안내</div></div>
    <div class="stat-item"><div class="stat-n" id="sPaid">0</div><div class="stat-l">결제 완료</div></div>
  </div>

  <div class="sbar" id="SBar">토큰을 입력한 뒤 리드를 불러오세요.</div>

  <div class="card" style="padding:0;overflow:hidden" id="TableWrap">
    <table id="LeadTable">
      <thead>
        <tr>
          <th>접수일시</th><th>이름</th><th>이메일</th><th>점수</th>
          <th>후속 상태</th><th>리포트 상태</th><th>메모/노트</th><th>저장</th>
        </tr>
      </thead>
      <tbody id="LeadBody"><tr><td colspan="8" class="empty">리드를 불러오세요.</td></tr></tbody>
    </table>
  </div>
</div>

<script>
var FOLLOW={'new':'신규','contacted':'연락 완료','payment_guided':'결제 안내','hold':'보류','test':'테스트'};
var PAID={'none':'미안내','guided':'안내 완료','interested':'관심','paid':'결제 완료','declined':'거절'};

function ge(id){return document.getElementById(id)}
function esc(v){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function tkn(){return (ge('tkn').value||sessionStorage.getItem('ansim_admin_tkn')||'').trim()}
function setBar(msg,type){var b=ge('SBar');b.textContent=msg;b.className='sbar'+(type==='ok'?' ok':type==='er'?' er':'')}

function fmt(v){
  if(!v)return '-';
  try{var d=new Date(v);return d.getFullYear()+'.'+(d.getMonth()+1).toString().padStart(2,'0')+'.'+d.getDate().toString().padStart(2,'0')+' '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')}
  catch(e){return String(v).slice(0,16)}
}

function badgeCls(map,v){return 'badge b-'+(map==='f'?v||'new':v||'none')}

function optHtml(map,sel){
  return Object.keys(map).map(function(k){
    return'<option value="'+k+'"'+(k===sel?' selected':'')+'>'+map[k]+'</option>';
  }).join('');
}

function isTest(lead){
  var vals=[lead.name,lead.email,lead.note].map(function(v){return String(v||'').toLowerCase()});
  return vals.some(function(v){return v.includes('test')||v.includes('테스트')});
}

function renderStat(leads){
  var cnt={new:0,contacted:0,payment_guided:0,paid:0};
  leads.forEach(function(l){
    var f=l.followup_status||'new';
    if(cnt[f]!=null)cnt[f]++;
    if((l.paid_report_status||'none')==='paid')cnt.paid++;
  });
  ge('sTotal').textContent=leads.length;
  ge('sNew').textContent=cnt.new;
  ge('sContacted').textContent=cnt.contacted;
  ge('sPayment').textContent=cnt.payment_guided;
  ge('sPaid').textContent=cnt.paid;
  ge('Stat').style.display='';
}

function renderLeads(leads){
  if(!leads.length){ge('LeadBody').innerHTML='<tr><td colspan="8" class="empty">리드가 없습니다.</td></tr>';return}
  ge('LeadBody').innerHTML=leads.map(function(l){
    var fs=l.followup_status||'new';
    var ps=l.paid_report_status||'none';
    var test=isTest(l);
    return '<tr data-id="'+esc(l.id)+'">'
      +'<td>'+esc(fmt(l.created_at))+'</td>'
      +'<td>'+esc(l.name||'')+(test?'<span class="test-tag">TEST</span>':'')+'</td>'
      +'<td><a href="mailto:'+esc(l.email||'')+'">'+esc(l.email||'')+'</a></td>'
      +'<td style="text-align:center">'+esc(String(l.score||'-'))+'</td>'
      +'<td><span class="badge b-'+fs+'">'+esc(FOLLOW[fs]||fs)+'</span><br>'
        +'<select class="sel-s sel-f" data-id="'+esc(l.id)+'">'+optHtml(FOLLOW,fs)+'</select></td>'
      +'<td><span class="badge b-'+ps+'">'+esc(PAID[ps]||ps)+'</span><br>'
        +'<select class="sel-s sel-p" data-id="'+esc(l.id)+'">'+optHtml(PAID,ps)+'</select></td>'
      +'<td>'+(l.note?'<div class="note-pre">'+esc(l.note)+'</div>':'')
        +'<textarea class="note-ta" data-id="'+esc(l.id)+'" rows="2" style="margin-top:6px;font-size:12px" placeholder="후속 메모">'+esc(l.followup_note||'')+'</textarea></td>'
      +'<td><button class="btn btn-p btn-sm js-save" data-id="'+esc(l.id)+'">저장</button></td>'
      +'</tr>';
  }).join('');

  ge('LeadBody').querySelectorAll('.js-save').forEach(function(btn){
    btn.onclick=function(){save(btn.getAttribute('data-id'))};
  });
}

async function load(){
  var t=tkn();
  if(!t){setBar('토큰을 입력해주세요.','er');return}
  sessionStorage.setItem('ansim_admin_tkn',t);
  setBar('불러오는 중...');
  try{
    var fs=ge('fStatus').value,fp=ge('fPaid').value;
    var url='/api/admin/leads/list?limit=100'+(fs?'&followupStatus='+fs:'')+(fp?'&paidReportStatus='+fp:'');
    var r=await fetch(url,{headers:{'x-admin-token':t}});
    var d=await r.json().catch(function(){return{}});
    if(!r.ok||!d.ok)throw new Error(d.error||'불러오기 실패');
    renderLeads(d.leads||[]);
    renderStat(d.leads||[]);
    setBar((d.leads||[]).length+'건 불러왔습니다.','ok');
  }catch(e){setBar('오류: '+e.message,'er')}
}

async function save(id){
  var t=tkn();
  if(!t){setBar('토큰을 입력해주세요.','er');return}
  var row=ge('LeadBody').querySelector('tr[data-id="'+id+'"]');
  if(!row)return;
  var fs=row.querySelector('.sel-f').value;
  var ps=row.querySelector('.sel-p').value;
  var note=row.querySelector('.note-ta').value.trim();
  try{
    var r=await fetch('/api/admin/leads/update-status',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-admin-token':t},
      body:JSON.stringify({leadId:id,followupStatus:fs,paidReportStatus:ps,followupNote:note})
    });
    var d=await r.json().catch(function(){return{}});
    if(!r.ok||!d.ok)throw new Error(d.error||'저장 실패');
    setBar('저장되었습니다.','ok');
  }catch(e){setBar('저장 오류: '+e.message,'er')}
}

function reset(){ge('fStatus').value='';ge('fPaid').value='';load()}

document.querySelectorAll('.qf-btn').forEach(function(btn){
  btn.onclick=function(){
    document.querySelectorAll('.qf-btn').forEach(function(b){b.classList.remove('on')});
    btn.classList.add('on');
    ge('fStatus').value=btn.getAttribute('data-f');
    ge('fPaid').value=btn.getAttribute('data-p');
    load();
  };
});

var saved=sessionStorage.getItem('ansim_admin_tkn');
if(saved)ge('tkn').value=saved;
ge('tkn').onkeydown=function(e){if(e.key==='Enter')load()};
</script>
</body>
</html>
