<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>결제 완료 | 안심상속</title>
<meta name="robots" content="noindex, nofollow">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: #f8f9fa;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 48px 36px;
    max-width: 480px;
    width: 100%;
    text-align: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .icon { font-size: 52px; margin-bottom: 20px; }
  h1 { font-size: 22px; color: #1a3a5c; font-weight: 700; margin-bottom: 12px; line-height: 1.4; }
  .sub { font-size: 15px; color: #555; line-height: 1.7; margin-bottom: 28px; }
  .progress-box {
    background: #f0f4f8;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 28px;
  }
  .progress-label { font-size: 13px; color: #666; margin-bottom: 10px; }
  .progress-bar-wrap { background: #dde5ee; border-radius: 99px; height: 8px; overflow: hidden; }
  .progress-bar { background: #1a3a5c; height: 8px; border-radius: 99px; width: 0%; transition: width 0.4s; }
  .progress-status { font-size: 13px; color: #1a3a5c; font-weight: 600; margin-top: 10px; }
  .notice { font-size: 13px; color: #888; line-height: 1.6; margin-bottom: 28px; }
  .btn-home {
    display: inline-block;
    background: #1a3a5c;
    color: #fff;
    text-decoration: none;
    padding: 14px 36px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
  }
  #error-box {
    display: none;
    background: #fff5f5;
    border: 1px solid #fed7d7;
    border-radius: 10px;
    padding: 16px;
    color: #c53030;
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 20px;
  }
</style>
</head>
<body>
<div class="card">
  <div id="icon-area" class="icon">⏳</div>
  <h1 id="title">리포트 생성 중...</h1>
  <p class="sub" id="subtitle">
    결제가 확인되었습니다.<br>
    상세 리포트를 생성하고 있습니다.
  </p>

  <div class="progress-box" id="progress-box">
    <p class="progress-label">리포트 생성 진행률</p>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <p class="progress-status" id="progress-status">분석 중...</p>
  </div>

  <div id="error-box"></div>

  <p class="notice" id="notice" style="display:none;">
    리포트 수신에 문제가 있으시면<br>
    <a href="mailto:help@ansimsangsok.kr" style="color:#1a3a5c;">help@ansimsangsok.kr</a>로 문의해주세요.
  </p>

  <a href="/" class="btn-home" id="btn-home" style="display:none;">홈으로 돌아가기</a>
</div>

<script>
(function () {
  // ── localStorage에서 결제 정보 복원 ──
  var orderId, answers, deepAnswers;
  try {
    orderId     = localStorage.getItem('ansimsangsok_order_id') || '';
    answers     = JSON.parse(localStorage.getItem('ansimsangsok_answers')     || 'null');
    deepAnswers = JSON.parse(localStorage.getItem('ansimsangsok_deep_answers')|| 'null');
  } catch (e) {
    orderId = ''; answers = null; deepAnswers = null;
  }

  function setProgress(pct, label) {
    document.getElementById('progress-bar').style.width = pct + '%';
    document.getElementById('progress-status').textContent = label;
  }

  function showDone(email) {
    document.getElementById('icon-area').textContent = '✅';
    document.getElementById('title').textContent = '리포트가 이메일로 발송되었습니다';
    document.getElementById('subtitle').textContent =
      (email ? (email + ' 으로') : '') + ' 상세 리포트가 발송되었습니다.\n스팸함도 확인해주세요.';
    document.getElementById('progress-box').style.display = 'none';
    document.getElementById('notice').style.display = 'block';
    document.getElementById('btn-home').style.display = 'inline-block';
    // 사용한 로컬스토리지 정리
    localStorage.removeItem('ansimsangsok_order_id');
    localStorage.removeItem('ansimsangsok_answers');
    localStorage.removeItem('ansimsangsok_deep_answers');
  }

  function showError(msg) {
    document.getElementById('icon-area').textContent = '⚠️';
    document.getElementById('title').textContent = '리포트 생성 중 오류';
    document.getElementById('subtitle').textContent = '';
    document.getElementById('progress-box').style.display = 'none';
    var errBox = document.getElementById('error-box');
    errBox.style.display = 'block';
    errBox.innerHTML = msg;
    document.getElementById('notice').style.display = 'block';
    document.getElementById('btn-home').style.display = 'inline-block';
  }

  async function generateReport() {
    if (!orderId) {
      // orderId 없으면 결제 확인만 표시
      document.getElementById('icon-area').textContent = '✅';
      document.getElementById('title').textContent = '결제가 완료되었습니다';
      document.getElementById('subtitle').textContent =
        '리포트는 이메일로 발송됩니다.\n이메일이 도착하지 않으면 스팸함을 확인해주세요.';
      document.getElementById('progress-box').style.display = 'none';
      document.getElementById('btn-home').style.display = 'inline-block';
      return;
    }

    if (!answers || typeof answers !== 'object') {
      showError(
        '설문 데이터를 찾을 수 없습니다.<br>' +
        '결제는 정상 처리되었습니다. 리포트 발급을 위해<br>' +
        '<a href="mailto:help@ansimsangsok.kr" style="color:#1a3a5c;">help@ansimsangsok.kr</a>로 문의해주세요.<br>' +
        '(주문번호: ' + orderId + ')'
      );
      return;
    }

    // 프로그레스 애니메이션
    setProgress(10, '결제 확인 중...');
    await sleep(600);
    setProgress(25, '설문 분석 중...');
    await sleep(800);
    setProgress(45, 'AI 리포트 생성 중...');

    try {
      var resp = await fetch('/api/generate-report', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          orderId:     orderId,
          answers:     answers,
          deepAnswers: deepAnswers || {},
        }),
      });

      setProgress(80, '리포트 마무리 중...');

      if (!resp.ok) {
        var errData = await resp.json().catch(function() { return {}; });
        throw new Error(errData.message || 'generate-report API 오류 ' + resp.status);
      }

      var data = await resp.json();
      if (!data.ok) throw new Error(data.message || '리포트 생성 실패');

      setProgress(100, '완료!');
      await sleep(400);
      showDone(answers.email || '');

    } catch (err) {
      console.error('[payment-success] generate-report 오류:', err);
      showError(
        '리포트 생성 중 오류가 발생했습니다.<br>' +
        '결제는 정상 처리되었습니다. 아래 이메일로 문의해주세요.<br>' +
        '<a href="mailto:help@ansimsangsok.kr" style="color:#1a3a5c;">help@ansimsangsok.kr</a><br>' +
        '(주문번호: ' + orderId + ')'
      );
    }
  }

  function sleep(ms) { return new Promise(function(r) { setTimeout(r, ms); }); }

  // 페이지 로드 즉시 실행
  generateReport();
})();
</script>
</body>
</html>
