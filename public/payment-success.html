<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendard-variable.min.css"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>결제 처리 중 | 안심상속</title>
<meta name="robots" content="noindex"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Pretendard Variable",Pretendard,system-ui,-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;background:#0d1f17;color:#fffdf5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .box{max-width:420px;width:100%;text-align:center}
  .spinner{width:44px;height:44px;border:4px solid rgba(241,213,134,.25);border-top-color:#f1d586;border-radius:50%;margin:0 auto 24px;animation:spin 0.9s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  h1{font-size:1.15rem;font-weight:800;margin-bottom:10px}
  p{font-size:.92rem;color:rgba(255,253,245,.7);line-height:1.6}
  .err{display:none;background:rgba(220,80,80,.12);border:1px solid rgba(220,80,80,.35);border-radius:14px;padding:18px;margin-top:18px;font-size:.88rem;color:#ffb4b4;text-align:left}
  .retry{display:none;margin-top:16px;background:#f1d586;color:#0d1f17;border:none;border-radius:10px;padding:12px 20px;font-weight:800;font-size:.9rem;cursor:pointer}
</style>
</head>
<body>
<div class="box">
  <div class="spinner" id="Spin"></div>
  <h1 id="Title">결제를 확인하고 있습니다</h1>
  <p id="Sub">잠시만 기다려주세요. 화면을 닫지 마세요.</p>
  <div class="err" id="ErrBox"></div>
  <button class="retry" id="RetryBtn" type="button" onclick="window.location.href='/'">처음으로 돌아가기</button>
</div>

<script>
(function(){
  /* 페이앱은 returnurl 도착 시 결제정보를 URL로 주지 않는다.
     결제완료는 feedbackurl(서버)이 Supabase에 status='paid'로 기록한다.
     이 화면은 저장해 둔 orderId로 Supabase를 폴링해 결제 확인 후 /deep-survey로 이동한다. */

  function showError(msg){
    document.getElementById('Spin').style.display='none';
    document.getElementById('Title').textContent='결제 확인에 실패했습니다';
    document.getElementById('Sub').textContent='아래 내용을 확인해주세요.';
    var eb = document.getElementById('ErrBox');
    eb.style.display='block';
    eb.textContent = msg || '알 수 없는 오류가 발생했습니다. 결제가 정상 처리되었다면 잠시 후 다시 시도해주세요.';
    document.getElementById('RetryBtn').style.display='inline-block';
  }

  /* orderId 복구: URL 쿼리(?orderId=) 우선 → 없으면 storage.
     URL 우선이라 브라우저/컨텍스트가 갈려 localStorage가 비어도 폴링 가능. */
  var orderId = '';
  try{
    var qs = new URLSearchParams(window.location.search);
    orderId = (qs.get('orderId') || '').trim();
  }catch(e){}
  if(!orderId){
    try{
      orderId = localStorage.getItem('ansim_pending_order') || '';
      if(!orderId){
        var raw = sessionStorage.getItem('ansim_report_request') || localStorage.getItem('ansim_report_request_backup');
        if(raw){ var o = JSON.parse(raw); orderId = o.orderId || ''; }
      }
    }catch(e){}
  }
  /* URL로 받은 orderId를 storage에도 심어 둠 → 이후 deep-survey/report가 storage를 참조 */
  if(orderId){
    try{
      localStorage.setItem('ansim_pending_order', orderId);
      var rb = sessionStorage.getItem('ansim_report_request') || localStorage.getItem('ansim_report_request_backup');
      var ro = rb ? JSON.parse(rb) : {};
      ro.orderId = orderId;
      var rs = JSON.stringify(ro);
      sessionStorage.setItem('ansim_report_request', rs);
      localStorage.setItem('ansim_report_request_backup', rs);
    }catch(e){}
  }

  if(!orderId){
    showError('주문 정보를 찾을 수 없습니다. 결제가 완료되었다면 처음 화면에서 다시 진행해주세요.');
    return;
  }

  function goNext(){
    /* sessionStorage 복구(모바일 탭 정리 대비) — 토스 원본과 동일하게 deep-survey로 이동 */
    try{
      var reqRaw = sessionStorage.getItem('ansim_report_request');
      if(!reqRaw){ reqRaw = localStorage.getItem('ansim_report_request_backup'); }
      var reqObj = reqRaw ? JSON.parse(reqRaw) : {};
      reqObj.orderId = orderId;
      var reqStr = JSON.stringify(reqObj);
      sessionStorage.setItem('ansim_report_request', reqStr);
      localStorage.setItem('ansim_report_request_backup', reqStr);
      localStorage.setItem('ansim_pending_order', orderId);
      sessionStorage.setItem('ansim_payment_done', JSON.stringify({ orderId: orderId, paidAt: new Date().toISOString() }));
    }catch(e){}
    document.getElementById('Title').textContent='결제가 완료되었습니다';
    document.getElementById('Sub').textContent='심화 설문으로 이동합니다.';
    setTimeout(function(){ window.location.href = '/deep-survey'; }, 600);
  }

  /* Supabase 폴링: status='paid' 될 때까지 확인 */
  var tries = 0;
  var MAX_TRIES = 120;      // 최대 120회
  var INTERVAL = 2000;    // 2초 간격 → 최대 4분

  function poll(){
    tries++;
    fetch('/api/payapp-status?orderId=' + encodeURIComponent(orderId), { cache:'no-store' })
      .then(function(res){ return res.json(); })
      .then(function(data){
        if(data && data.paid){ goNext(); return; }
        if(tries >= MAX_TRIES){
          showError('결제 확인이 지연되고 있습니다. 결제가 완료되었다면 1~2분 후 처음 화면에서 다시 진행하시거나 고객센터로 문의해주세요. (주문번호: ' + orderId + ')');
          return;
        }
        setTimeout(poll, INTERVAL);
      })
      .catch(function(){
        if(tries >= MAX_TRIES){
          showError('네트워크 오류로 결제 확인이 지연되고 있습니다. 잠시 후 다시 시도해주세요. (주문번호: ' + orderId + ')');
          return;
        }
        setTimeout(poll, INTERVAL);
      });
  }

  poll();
})();
</script>
</body>
</html>
