<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>안심상속 무료진단</title>
<style>
  :root {
    --forest: #0e3529;
    --forest-deep: #06251d;
    --gold: #d7ad55;
    --gold-light: #f1d586;
    --cream: #fff8e8;
    --paper: #fffdf6;
    --ink: #12231d;
    --muted: #5e6b64;
    --line: rgba(14, 53, 41, 0.18);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    color: var(--ink);
    -webkit-text-size-adjust: 100%;
  }

  .survey {
    max-width: 680px;
    margin: 0 auto;
    padding: 4px 0 calc(40px + env(safe-area-inset-bottom, 0px));
  }

  /* 진행 표시 */
  .survey-progress-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin: 0 0 8px;
    font-weight: 800;
    color: var(--forest-deep);
  }
  .survey-progress-step { font-size: 1.05rem; }
  .survey-progress-time { font-size: 0.92rem; color: var(--muted); font-weight: 700; }

  .survey-progress-track {
    height: 8px;
    border-radius: 999px;
    background: rgba(14, 53, 41, 0.12);
    overflow: hidden;
    margin: 0 0 18px;
  }
  .survey-progress-bar {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(135deg, #f5dc8a, #c99938);
    transition: width 0.2s ease;
  }

  /* 질문 카드 */
  .survey-card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 20px 18px;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
  }

  .survey-question-title {
    margin: 0 0 6px;
    font-size: 1.22rem;
    line-height: 1.4;
    font-weight: 900;
    color: var(--forest-deep);
  }
  .survey-question-help {
    margin: 0 0 16px;
    font-size: 0.96rem;
    line-height: 1.55;
    color: var(--muted);
    font-weight: 600;
  }

  /* 선택지 */
  .survey-options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .survey-option {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
    width: 100%;
    margin: 0;
    min-height: 60px;
    padding: 15px 16px;
    border: 2px solid rgba(14, 53, 41, 0.20);
    border-radius: 16px;
    background: #ffffff;
    color: var(--forest-deep);
    font-family: inherit;
    font-size: 1.04rem;
    font-weight: 800;
    text-align: left;
    line-height: 1.4;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: rgba(215, 173, 85, 0.25);
    -webkit-user-select: none;
    user-select: none;
    transition: background-color 0.12s ease, border-color 0.12s ease, color 0.12s ease;
  }
  .survey-option:active { transform: scale(0.995); }

  .survey-option.is-selected {
    background: #0e3529;
    color: #fff8dc;
    border-color: #d7ad55;
  }

  .survey-option-text { display: block; font-weight: 800; }

  .survey-option-mark {
    display: none;
    font-size: 0.8rem;
    font-weight: 800;
    color: #d7ad55;
    line-height: 1;
  }
  .survey-option.is-selected .survey-option-mark { display: block; }

  /* assetCounts 그룹 */
  .survey-asset-group { margin-top: 16px; }
  .survey-asset-group:first-child { margin-top: 0; }
  .survey-asset-title {
    font-weight: 900;
    color: var(--forest-deep);
    margin: 0 0 2px;
    font-size: 1.02rem;
  }
  .survey-asset-question {
    margin: 0 0 8px;
    color: var(--muted);
    font-size: 0.92rem;
    font-weight: 600;
  }
  .survey-empty-note {
    margin: 4px 0 0;
    color: var(--muted);
    font-weight: 700;
    line-height: 1.6;
  }

  /* 네비게이션 */
  .survey-nav {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 18px;
  }
  .survey-btn {
    width: 100%;
    min-height: 56px;
    border-radius: 16px;
    font-family: inherit;
    font-size: 1.08rem;
    font-weight: 900;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    border: 2px solid transparent;
    transition: opacity 0.12s ease;
  }
  .survey-btn-next {
    background: linear-gradient(135deg, #f5dc8a, #c99938);
    color: var(--forest-deep);
    border-color: #c99938;
  }
  .survey-btn-prev {
    background: #ffffff;
    color: var(--muted);
    border-color: var(--line);
  }
  .survey-btn:disabled { opacity: 0.45; cursor: default; }
  .survey-btn:active:not(:disabled) { opacity: 0.85; }
</style>
</head>
<body>
  <div class="survey" id="survey">
    <div class="survey-progress-row">
      <span class="survey-progress-step" id="progressStep">1 / 9</span>
      <span class="survey-progress-time">약 2분 소요</span>
    </div>
    <div class="survey-progress-track">
      <div class="survey-progress-bar" id="progressBar" style="width: 11%;"></div>
    </div>

    <div class="survey-card">
      <h3 class="survey-question-title" id="questionTitle"></h3>
      <p class="survey-question-help" id="questionHelp"></p>
      <div class="survey-options" id="options"></div>
    </div>

    <div class="survey-nav">
      <button type="button" class="survey-btn survey-btn-next" id="nextBtn">다음</button>
      <button type="button" class="survey-btn survey-btn-prev" id="prevBtn" disabled>이전</button>
    </div>
  </div>

<script>
(function () {
  "use strict";

  var questions = [
    {
      type: "single", key: "family",
      title: "현재 상속과 관련된 가족 상황은 어떤가요?",
      help: "가장 가까운 상황을 선택해주세요.",
      options: [
        { label: "배우자와 자녀가 있음", score: 8 },
        { label: "재혼가정 또는 전혼 자녀가 있음", score: 22 },
        { label: "자녀가 없거나 형제자매와 관련될 수 있음", score: 18 },
        { label: "정확히 모르겠음", score: 12 }
      ]
    },
    {
      type: "single", key: "will",
      title: "유언장이나 재산 분배 계획이 준비되어 있나요?",
      help: "문서 여부보다 현재 정리 수준을 기준으로 답해주세요.",
      options: [
        { label: "이미 정리해둔 내용이 있음", score: 6 },
        { label: "생각은 있지만 문서로 정리하지 않음", score: 14 },
        { label: "아직 정리하지 못함", score: 22 },
        { label: "정확히 모르겠음", score: 12 }
      ]
    },
    {
      type: "multiSimple", key: "assetPresence",
      title: "보유한 부동산이 있나요?",
      help: "해당되는 항목을 먼저 선택해주세요. 여러 개를 동시에 선택할 수 있습니다.",
      exclusive: ["none", "unknown"],
      options: [
        { value: "house", label: "주택", score: 0 },
        { value: "land", label: "토지", score: 0 },
        { value: "incomeRealEstate", label: "수익형 부동산(상가·오피스텔·펜션)", score: 0 },
        { value: "factory", label: "공장·창고", score: 0 },
        { value: "otherRealEstate", label: "기타 부동산", score: 0 },
        { value: "none", label: "해당 없음", score: 0 },
        { value: "unknown", label: "정확히 모르겠음", score: 8 }
      ]
    },
    {
      type: "assetCounts", key: "assetCounts",
      title: "선택한 부동산은 얼마나 보유하고 있나요?",
      help: "앞에서 있다고 선택한 항목만 수량을 확인합니다.",
      presenceKey: "assetPresence",
      assets: [
        { key: "house", title: "주택", question: "주택은 몇채인가요?", labels: ["1채", "2채", "3채 이상"], scores: [7, 13, 18] },
        { key: "land", title: "토지", question: "토지는 몇곳에 있나요?", labels: ["1곳", "2곳", "3곳 이상"], scores: [8, 14, 20] },
        { key: "incomeRealEstate", title: "수익형 부동산", question: "상가·오피스텔·펜션은 몇개 보유하고 있나요?", labels: ["1개", "2개", "3개 이상"], scores: [8, 14, 20] },
        { key: "factory", title: "공장·창고", question: "공장·창고는 몇곳에 있나요?", labels: ["1곳", "2곳", "3곳 이상"], scores: [8, 14, 20] },
        { key: "otherRealEstate", title: "기타 부동산", question: "기타 부동산은 몇건인가요?", labels: ["1건", "2건", "3건 이상"], scores: [6, 11, 16] }
      ]
    },
    {
      type: "single", key: "gift",
      title: "과거에 특정 가족에게 더 많이 준 재산이 있나요?",
      help: "증여, 명의 이전, 큰 금액 지원 등을 떠올려 답해주세요.",
      options: [
        { label: "없음", score: 4 },
        { label: "일부 있음", score: 16 },
        { label: "상당히 있음", score: 26 },
        { label: "정확히 모르겠음", score: 14 }
      ]
    },
    {
      type: "single", key: "business",
      title: "가족 사업, 지분, 임대수익처럼 나누기 복잡한 재산이 있나요?",
      help: "사업체, 법인 지분, 공동명의, 임대수익 등을 포함해 생각해주세요.",
      options: [
        { label: "없음", score: 3 },
        { label: "조금 있음", score: 12 },
        { label: "중요한 비중을 차지함", score: 24 },
        { label: "정확히 모르겠음", score: 12 }
      ]
    },
    {
      type: "multiSimple", key: "overseas",
      title: "해외 국적·해외 거주·해외 재산 요소가 있나요?",
      help: "여러 개를 동시에 선택할 수 있습니다. 해당 없음과 정확히 모르겠음은 단독 선택됩니다.",
      exclusive: ["none", "unknown"],
      options: [
        { value: "self_abroad", label: "본인이 해외 거주 중", score: 16 },
        { value: "family_abroad", label: "배우자 또는 자녀가 해외 거주 중", score: 14 },
        { value: "family_foreign_nationality", label: "배우자 또는 자녀가 외국 국적", score: 16 },
        { value: "overseas_asset", label: "해외 부동산 또는 해외 금융자산이 있음", score: 18 },
        { value: "none", label: "해당 없음", score: 0 },
        { value: "unknown", label: "정확히 모르겠음", score: 10 }
      ]
    },
    {
      type: "single", key: "conflict",
      title: "가족 사이에 이미 의견 차이나 갈등 조짐이 있나요?",
      help: "겉으로 드러난 다툼뿐 아니라 말하기 어려운 분위기도 포함해 생각해주세요.",
      options: [
        { label: "없음", score: 4 },
        { label: "조금 있음", score: 14 },
        { label: "이미 뚜렷함", score: 28 },
        { label: "정확히 모르겠음", score: 12 }
      ]
    },
    {
      type: "single", key: "documents",
      title: "재산 목록, 가족관계, 채무 등 기본 자료가 정리되어 있나요?",
      help: "완벽하지 않아도 한곳에 모아둔 자료가 있는지 기준으로 답해주세요.",
      options: [
        { label: "대체로 정리되어 있음", score: 4 },
        { label: "일부만 정리되어 있음", score: 12 },
        { label: "거의 정리되어 있지 않음", score: 22 },
        { label: "정확히 모르겠음", score: 12 }
      ]
    }
  ];

  var state = { step: 0, answers: {} };

  var elStep = document.getElementById("progressStep");
  var elBar = document.getElementById("progressBar");
  var elTitle = document.getElementById("questionTitle");
  var elHelp = document.getElementById("questionHelp");
  var elOptions = document.getElementById("options");
  var elNext = document.getElementById("nextBtn");
  var elPrev = document.getElementById("prevBtn");

  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }

  function optionButton(value, label, assetKey, selected) {
    var assetAttr = assetKey ? ' data-asset="' + esc(assetKey) + '"' : "";
    var sel = selected ? " is-selected" : "";
    return '<button type="button" class="survey-option' + sel + '" data-value="' + esc(value) + '"' + assetAttr + '>' +
      '<span class="survey-option-text">' + esc(label) + '</span>' +
      '<span class="survey-option-mark">✓ 선택됨</span>' +
      '</button>';
  }

  function renderOptions(q) {
    if (q.type === "single") {
      var ans = state.answers[q.key];
      return q.options.map(function (o) {
        return optionButton(o.label, o.label, null, ans === o.label);
      }).join("");
    }
    if (q.type === "multiSimple") {
      var arr = Array.isArray(state.answers[q.key]) ? state.answers[q.key] : [];
      return q.options.map(function (o) {
        return optionButton(o.value, o.label, null, arr.indexOf(o.value) !== -1);
      }).join("");
    }
    if (q.type === "assetCounts") {
      var counts = state.answers[q.key] || {};
      var presence = Array.isArray(state.answers[q.presenceKey])
        ? state.answers[q.presenceKey].filter(function (k) { return k !== "none" && k !== "unknown"; })
        : [];
      var assets = q.assets.filter(function (a) { return presence.indexOf(a.key) !== -1; });
      if (assets.length === 0) {
        return '<p class="survey-empty-note">앞 질문에서 보유한 부동산을 선택하면 여기서 수량을 확인합니다. 선택한 항목이 없으면 다음으로 넘어가세요.</p>';
      }
      return assets.map(function (a) {
        var opts = a.labels.map(function (label) {
          return optionButton(label, label, a.key, counts[a.key] === label);
        }).join("");
        return '<div class="survey-asset-group">' +
          '<div class="survey-asset-title">' + esc(a.title) + '</div>' +
          '<p class="survey-asset-question">' + esc(a.question) + '</p>' +
          '<div class="survey-options">' + opts + '</div>' +
          '</div>';
      }).join("");
    }
    return "";
  }

  function onOptionTap(btn) {
    var q = questions[state.step];
    if (!q || !btn) return;
    var value = btn.getAttribute("data-value");

    if (q.type === "single") {
      state.answers[q.key] = value;
    } else if (q.type === "assetCounts") {
      var assetKey = btn.getAttribute("data-asset");
      if (!assetKey) return;
      if (!state.answers[q.key]) state.answers[q.key] = {};
      state.answers[q.key][assetKey] = value;
    } else if (q.type === "multiSimple") {
      var exclusive = q.exclusive || [];
      var sel = Array.isArray(state.answers[q.key]) ? state.answers[q.key].slice() : [];
      var on = sel.indexOf(value) !== -1;
      if (exclusive.indexOf(value) !== -1) {
        sel = on ? [] : [value];
      } else if (on) {
        sel = sel.filter(function (v) { return v !== value; });
      } else {
        sel = sel.filter(function (v) { return exclusive.indexOf(v) === -1; });
        sel.push(value);
      }
      state.answers[q.key] = sel;
    } else {
      return;
    }
    render();
  }

  function render() {
    var q = questions[state.step];
    var total = questions.length;
    elStep.textContent = (state.step + 1) + " / " + total;
    elBar.style.width = (((state.step + 1) / total) * 100) + "%";
    elTitle.textContent = q.title;
    elHelp.textContent = q.help || "";
    elOptions.innerHTML = renderOptions(q);

    elNext.textContent = state.step === total - 1 ? "결과 확인하기" : "다음";
    elPrev.disabled = state.step === 0;

    notifyHeight();
  }

  // 선택지: 컨테이너에 위임으로 한 번만 바인딩 (재렌더돼도 리스너 유지)
  var optionLock = false;
  function handleOptionEvent(ev) {
    var btn = ev.target.closest ? ev.target.closest(".survey-option") : null;
    if (!btn || !elOptions.contains(btn)) return;
    if (ev) { ev.preventDefault(); ev.stopPropagation(); }
    if (optionLock) return;          // touchend+click 중복 방지
    optionLock = true;
    setTimeout(function () { optionLock = false; }, 350);
    onOptionTap(btn);
  }
  elOptions.addEventListener("click", handleOptionEvent, false);
  elOptions.addEventListener("touchend", handleOptionEvent, false);

  function bindTap(el, handler) {
    if (!el) return;
    var locked = false;
    function fire(ev) {
      if (ev) { ev.preventDefault(); ev.stopPropagation(); }
      if (locked) return;
      locked = true;
      setTimeout(function () { locked = false; }, 350);
      handler();
    }
    el.addEventListener("click", fire, false);
    el.addEventListener("touchend", fire, false);
  }

  function goNext() {
    if (state.step < questions.length - 1) {
      state.step += 1;
      render();
      scrollTop();
    } else {
      finish();
    }
  }
  function goPrev() {
    if (state.step > 0) {
      state.step -= 1;
      render();
      scrollTop();
    }
  }

  function scrollTop() {
    try { window.parent.postMessage({ type: "ansim-survey-scrolltop" }, "*"); } catch (e) {}
  }

  function notifyHeight() {
    try {
      var h = document.getElementById("survey").offsetHeight;
      window.parent.postMessage({ type: "ansim-survey-height", height: h + 8 }, "*");
    } catch (e) {}
  }

  function finish() {
    try {
      window.parent.postMessage({
        type: "ansim-survey-complete",
        answers: JSON.parse(JSON.stringify(state.answers))
      }, "*");
    } catch (e) {}
  }

  bindTap(elNext, goNext);
  bindTap(elPrev, goPrev);

  // 부모가 "다시 하기"를 요청하면 초기화
  window.addEventListener("message", function (ev) {
    if (ev.data && ev.data.type === "ansim-survey-reset") {
      state.step = 0;
      state.answers = {};
      render();
      scrollTop();
    }
  });

  render();
  window.addEventListener("load", notifyHeight);
  window.addEventListener("resize", notifyHeight);
})();
</script>
</body>
</html>
