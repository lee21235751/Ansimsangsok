<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>받은 견적 비교 | 안심상속</title>
<meta name="robots" content="noindex"/>
<link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
<style>
:root{--F:#0e3529;--FD:#06251d;--G:#d7ad55;--GL:#f1d586;--CR:#fff8e8;--INK:#12231d;--MU:#5e6b64;--LN:rgba(14,53,41,.18)}
*,*::before,*::after{box-sizing:border-box;margin:0}
body{font-family:system-ui,-apple-system,sans-serif;color:var(--INK);word-break:keep-all;overflow-x:hidden;background:#fffdf6}
button{font:inherit}
.w{width:min(680px,calc(100% - 32px));margin:0 auto}
.hero{background:linear-gradient(145deg,#082d22,#163b2a 62%,#24381f);color:#fffdf5;padding:28px 0 24px}
.brand{display:flex;align-items:center;gap:10px;font-weight:900;margin-bottom:12px}
.bm{width:34px;height:34px;border:1px solid rgba(215,173,85,.85);border-radius:50%;display:grid;place-items:center;color:var(--GL);font-weight:900;font-size:.85rem}
.hero h1{font-size:clamp(1.4rem,6vw,1.8rem);line-height:1.3;letter-spacing:-.03em;margin-bottom:8px}
.hero p{color:rgba(255,253,245,.8);font-size:.92rem;line-height:1.6}
.main{padding:22px 0 60px}
.bidcard{background:#fff;border:2px solid rgba(14,53,41,.16);border-radius:18px;padding:18px;margin-bottom:14px}
.bidcard.selected{border-color:var(--G);background:#fff8e8}
.expname{font-weight:950;color:var(--FD);font-size:1.05rem;margin-bottom:2px}
.expoffice{color:var(--MU);font-size:.86rem;font-weight:700;margin-bottom:10px}
.fee{display:inline-flex;background:var(--FD);color:var(--GL);border-radius:999px;padding:6px 13px;font-weight:900;font-size:.95rem;margin-bottom:8px}
.dates{color:#49564f;font-size:.9rem;font-weight:700;margin-bottom:6px}
.msg{color:#334155;line-height:1.6;font-size:.92rem;font-weight:600;margin-bottom:12px;padding:10px 12px;background:#f8fafc;border-radius:12px}
.selectbtn{border:0;background:linear-gradient(135deg,#f5dc8a,#c99938);color:#1c221c;border-radius:14px;padding:12px;font-weight:900;cursor:pointer;width:100%;font-size:.96rem}
.selectbtn[disabled]{opacity:.5;cursor:default}
.badge{display:inline-flex;background:#ecfdf5;color:#065f46;border:1px solid rgba(6,95,70,.2);border-radius:999px;padding:5px 11px;font-weight:900;font-size:.84rem;margin-bottom:8px}
.empty{text-align:center;color:var(--MU);padding:36px 10px;font-weight:700;line-height:1.6}
.notice{padding:14px;border-radius:14px;background:#f7faf7;border:1px solid rgba(31,77,58,.18);color:#334155;font-size:.88rem;line-height:1.6;font-weight:650;margin-bottom:16px}
.ovl{position:fixed;inset:0;background:rgba(6,37,29,.55);display:flex;align-items:flex-end;justify-content:center;z-index:999;padding:0}
.ovl.dn{display:none}
.sheet{background:#fff;border-radius:22px 22px 0 0;padding:22px 18px calc(22px + env(safe-area-inset-bottom,0));width:100%;max-width:520px}
.sheet h3{font-size:1.15rem;font-weight:950;color:var(--FD);margin-bottom:6px;letter-spacing:-.03em}
.sheet p{color:var(--MU);font-size:.88rem;line-height:1.6;font-weight:650;margin-bottom:16px}
.sfl{margin-bottom:12px}
.sfl label{display:block;margin-bottom:6px;color:var(--FD);font-weight:900;font-size:.92rem}
.sfl input{width:100%;border:2px solid rgba(14,53,41,.2);border-radius:14px;min-height:50px;padding:12px 14px;color:var(--FD);background:#fff;font-weight:650;font-size:1rem}
.serr{min-height:18px;margin-bottom:8px;font-size:.86rem;font-weight:800;color:#a02d19}
.sbtns{display:flex;gap:8px;margin-top:6px}
.sbtns button{flex:1;border:0;border-radius:14px;padding:13px;font-weight:900;cursor:pointer;font-size:.95rem}
.scancel{background:#f1f3f0;color:var(--MU)}
.sconfirm{background:linear-gradient(135deg,#f5dc8a,#c99938);color:#1c221c}
.sconfirm[disabled]{opacity:.5;cursor:default}
</style>
</head>
<body>
<header class="hero">
<div class="w">
<div class="brand"><div class="bm">안</div><span style="color:#fff8dc">안심상속</span></div>
<h1>받은 견적을 비교해보세요</h1>
<p>마음에 드는 전문가를 선택하면 직접 연락이 가능해집니다. 상담료는 전문가에게 직접 지불합니다.</p>
</div>
</header>

<main class="main">
<div class="w" id="content">
<div class="empty">불러오는 중...</div>
</div>
</main>

<div class="ovl dn" id="SelOvl">
<div class="sheet">
<h3>연락받으실 정보를 입력해주세요</h3>
<p>선택하신 전문가에게만 전달되며, 다른 전문가나 제3자에게는 공개되지 않습니다. 선택 후에는 변경할 수 없습니다.</p>
<div class="sfl"><label for="SelName">성함</label><input id="SelName" placeholder="홍길동"/></div>
<div class="sfl"><label for="SelPhone">연락처</label><input id="SelPhone" type="tel" placeholder="010-0000-0000"/></div>
<div class="serr" id="SelErr"></div>
<div class="sbtns">
<button class="scancel" type="button" id="SelCancel">취소</button>
<button class="sconfirm" type="button" id="SelConfirm">선택 완료하고 전달하기</button>
</div>
</div>
</div>

<script>
const params = new URLSearchParams(location.search);
const token = params.get('token');
const content = document.getElementById('content');

if(!token){
  content.innerHTML = '<div class="empty">유효한 접근 링크가 아닙니다.</div>';
} else {
  load();
}

async function load(){
  try{
    const res = await fetch('/api/consultation?action=bids&token=' + encodeURIComponent(token));
    const data = await res.json();
    if(!data.ok){
      content.innerHTML = '<div class="empty">' + (data.message || '불러올 수 없습니다.') + '</div>';
      return;
    }
    render(data.request, data.bids);
  } catch(err){
    content.innerHTML = '<div class="empty">오류가 발생했습니다.</div>';
  }
}

function render(request, bids){
  let html = '';
  if(request.status === 'closed'){
    html += '<div class="notice">이미 전문가를 선택하셨습니다. 선택하신 전문가에게 직접 연락해 상담을 진행해주세요.</div>';
  }
  if(!bids.length){
    html += '<div class="empty">아직 도착한 견적이 없습니다.<br>전문가가 견적을 제출하면 이 페이지에서 바로 확인하실 수 있습니다.</div>';
    content.innerHTML = html;
    return;
  }
  html += bids.map(b => renderBid(b, request)).join('');
  content.innerHTML = html;
  attachHandlers(request);
}

function renderBid(b, request){
  const ex = b.experts || {};
  const isSelected = b.status === 'selected';
  const typeLabel = ex.type === 'lawyer' ? '변호사' : ex.type === 'tax_accountant' ? '세무사' : '';
  return `
  <div class="bidcard ${isSelected?'selected':''}" data-id="${b.id}">
    ${isSelected ? '<div class="badge">✓ 선택됨</div>' : ''}
    <div class="expname">${esc(ex.name||'전문가')} ${typeLabel?'· '+typeLabel:''}</div>
    <div class="expoffice">${esc(ex.office_name||'')}</div>
    <div class="fee">${esc(b.proposed_fee)}</div>
    ${b.available_dates ? '<div class="dates">가능 일정: '+esc(b.available_dates)+'</div>' : ''}
    ${b.message ? '<div class="msg">'+esc(b.message)+'</div>' : ''}
    ${request.status === 'open' ? '<button class="selectbtn" data-act="select">이 전문가 선택하기</button>' : ''}
  </div>`;
}

function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

let pendingBidId = null;
const selOvl = document.getElementById('SelOvl');
const selName = document.getElementById('SelName');
const selPhone = document.getElementById('SelPhone');
const selErr = document.getElementById('SelErr');
const selConfirm = document.getElementById('SelConfirm');

function openSelModal(bidId){
  pendingBidId = bidId;
  selName.value = ''; selPhone.value = ''; selErr.textContent = '';
  selConfirm.disabled = false; selConfirm.textContent = '선택 완료하고 전달하기';
  selOvl.classList.remove('dn');
}
function closeSelModal(){
  selOvl.classList.add('dn');
  pendingBidId = null;
}

document.getElementById('SelCancel').addEventListener('click', closeSelModal);
selOvl.addEventListener('click', (e)=>{ if(e.target === selOvl) closeSelModal(); });

selConfirm.addEventListener('click', async ()=>{
  const name = selName.value.trim();
  const phone = selPhone.value.trim();
  selErr.textContent = '';
  if(!name){ selErr.textContent = '성함을 입력해주세요.'; return; }
  if(!phone){ selErr.textContent = '연락처를 입력해주세요.'; return; }
  selConfirm.disabled = true; selConfirm.textContent = '처리 중...';
  try{
    const res = await fetch('/api/consultation', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action: 'select', token, bid_id: pendingBidId, name, phone })
    });
    const data = await res.json();
    if(data.ok){ closeSelModal(); load(); }
    else { selErr.textContent = data.message || '오류가 발생했습니다.'; selConfirm.disabled=false; selConfirm.textContent='선택 완료하고 전달하기'; }
  } catch(err){
    selErr.textContent = '오류가 발생했습니다.'; selConfirm.disabled=false; selConfirm.textContent='선택 완료하고 전달하기';
  }
});

function attachHandlers(request){
  content.querySelectorAll('[data-act="select"]').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      const card = e.target.closest('.bidcard');
      openSelModal(card.dataset.id);
    });
  });
}
</script>
</body>
</html>
