  <footer class="site-footer">안심상속 · 상속분쟁 위험도 2분 진단</footer>


  <script>
    const CONFIG = window.__ANSIM_CONFIG__ || {};
    const questions = [
      { id:'spouse', title:'현재 법률상 배우자가 있나요?', choices:[['yes','있음',4],['no','없음',0]] },
      { id:'children', title:'자녀는 몇 명인가요?', choices:[['0','없음',4],['1','1명',1],['2','2명',3],['3','3명 이상',6]] },
      { id:'remarried', title:'재혼가정 또는 전혼 자녀가 있나요?', choices:[['no','아니오',0],['yes','예',18],['unknown','잘 모르겠음',8]] },
      { id:'assetRange', title:'대략적인 순재산 규모는 어느 정도인가요?', choices:[['under5','5억 미만',2],['5to10','5억~10억',6],['10to20','10억~20억',10],['20to30','20억~30억',14],['30to50','30억~50억',18],['over50','50억 이상',22],['unknown','정확히 모르겠음',8]] },
      { id:'realEstate', type:'multi', title:'보유한 부동산 유형을 모두 선택해주세요.', hint:'해당되는 항목을 모두 선택해주세요. 선택한 유형만 추가로 확인합니다. 정확한 수가 기억나지 않아도 괜찮습니다.', choices:[['none','없음',0],['house','주택',5],['commercial','상가',8],['officetel','오피스텔',6],['pension','펜션',8],['land','토지',9],['factory','공장·창고',9],['other','기타 부동산',7]], detailChoices:{ house:{label:'주택', question:'주택은 몇 채인가요?', choices:[['1','1채',0],['2','2채',7],['3','3채',12],['4plus','4채 이상',17],['unknown','정확히 모르겠음',8]]}, commercial:{label:'상가', question:'상가는 몇 개 보유하고 있나요?', choices:[['1','1개',5],['2','2개',10],['3plus','3개 이상',16],['unknown','정확히 모르겠음',8]]}, officetel:{label:'오피스텔', question:'오피스텔은 몇 개 보유하고 있나요?', choices:[['1','1개',4],['2','2개',8],['3plus','3개 이상',13],['unknown','정확히 모르겠음',7]]}, pension:{label:'펜션', question:'펜션은 몇 개 보유하고 있나요?', choices:[['1','1개',8],['2plus','2개 이상',15],['unknown','정확히 모르겠음',8]]}, land:{label:'토지', question:'토지는 몇 곳에 있나요?', choices:[['1','1곳',6],['2','2곳',11],['3plus','3곳 이상',17],['unknown','정확히 모르겠음',9]]}, factory:{label:'공장·창고', question:'공장·창고는 몇 개 보유하고 있나요?', choices:[['1','1개',8],['2plus','2개 이상',15],['unknown','정확히 모르겠음',8]]}, other:{label:'기타 부동산', question:'기타 부동산은 몇 개 보유하고 있나요?', choices:[['1','1개',5],['2plus','2개 이상',12],['unknown','정확히 모르겠음',7]]} } },
      { id:'gift', title:'이미 큰 금액이나 부동산을 증여한 적이 있나요?', choices:[['no','없음',0],['money','현금 등 일부 있음',8],['realestate','부동산 증여 있음',15],['unknown','잘 모르겠음',6]] },
      { id:'unequal', title:'특정 가족에게 더 많이 남길 계획이 있나요?', choices:[['no','아니오',0],['some','조금 더',8],['much','많이 더',16],['exclude','누군가 제외하고 싶음',22]] },
      { id:'overseas', title:'본인 또는 가족 중 해외 국적·해외 거주·해외 재산에 해당하는 경우가 있나요?', choices:[['none','해당 없음',0],['self_abroad','본인이 해외 거주 중',14],['family_abroad','배우자 또는 자녀가 해외 거주 중',12],['foreign_family','배우자 또는 자녀가 외국 국적',16],['foreign_assets','해외 부동산 또는 해외 금융자산이 있음',18],['unknown','정확히 모르겠음',8]] },
      { id:'will', title:'현재 유언장을 작성해두셨나요?', choices:[['no','없음',8],['hand','자필 유언 있음',5],['notary','공정증서 유언 있음',-8],['unknown','잘 모르겠음',5]] }
    ];
    let step = 0;
    const answers = {};
    const engagement = { sample_pdf_clicked:false, waitlist_intent:'', offer_clicks:[], last_offer:'' };
    const $ = (id) => document.getElementById(id);
    function setupInputLanguageHelpers(){
      const nameInput = $('leadName');
      const emailInput = $('leadEmail');
      const nameField = $('nameField');
      const emailField = $('emailField');
      const nameHint = $('nameHint');
      const emailHint = $('emailHint');
      if(nameInput){
        nameInput.addEventListener('input', () => {
          const value = nameInput.value.trim();
          const hasLatin = /[A-Za-z]/.test(value);
          const hasHangul = /[가-힣]/.test(value);
          nameField?.classList.toggle('invalid', Boolean(value && hasLatin && !hasHangul));
          if(nameHint){
            nameHint.textContent = value && hasLatin && !hasHangul ? '가능하면 성함을 한글로 입력해주세요.' : '성함을 한글로 입력해주세요.';
            nameHint.classList.toggle('warn', Boolean(value && hasLatin && !hasHangul));
          }
        });
      }
      if(emailInput){
        emailInput.addEventListener('input', () => {
          const before = emailInput.value;
          const cleaned = before.replace(/[ㄱ-ㅎㅏ-ㅣ가-힣\s]/g, '').toLowerCase();
          if(before !== cleaned) emailInput.value = cleaned;
          const value = emailInput.value.trim();
          const looksEmail = !value || /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(value);
          emailField?.classList.toggle('invalid', !looksEmail);
          if(emailHint){
            emailHint.textContent = looksEmail ? '이메일은 영문 주소 형식으로 입력해주세요.' : '이메일 형식으로 입력해주세요. 예: name@example.com';
            emailHint.classList.toggle('warn', !looksEmail);
          }
        });
      }
    }
    function answerValues(id){
      const value = answers[id];
      return Array.isArray(value) ? value : (value ? [value] : []);
    }
    function renderQuestion(){
      const q = questions[step];
      $('stepText').textContent = `${step+1} / ${questions.length}`;
      $('barFill').style.width = `${((step+1)/questions.length)*100}%`;
      $('questionTitle').textContent = q.title;
      if(q.type === 'multi'){
        const selected = answerValues(q.id);
        const hint = q.hint ? `<div class="question-hint">${q.hint}</div>` : '';
        const choicesHtml = q.choices.map(([value,label]) => `<button type="button" class="choice ${selected.includes(value)?'selected':''}" data-value="${value}">${label}</button>`).join('');
        const detailHtml = selected.filter(v => v !== 'none').map(type => {
          const detail = q.detailChoices?.[type];
          if(!detail) return '';
          const selectedCount = answers.realEstateCounts?.[type];
          return `<div class="subquestion"><div class="subquestion-title">${detail.question || (detail.label + '은 몇 개인가요?')}</div><div class="subchoices">${detail.choices.map(([value,label]) => `<button type="button" class="subchoice ${selectedCount===value?'selected':''}" data-type="${type}" data-value="${value}">${label}</button>`).join('')}</div></div>`;
        }).join('');
        $('choices').innerHTML = `${hint}<div class="choices multi">${choicesHtml}</div>${detailHtml}`;
        document.querySelectorAll('.choice').forEach(btn=>btn.addEventListener('click',()=>{
          const value = btn.dataset.value;
          let next = answerValues(q.id);
          if(value === 'none'){
            next = ['none'];
            answers.realEstateCounts = {};
          } else {
            next = next.filter(v => v !== 'none');
            next = next.includes(value) ? next.filter(v => v !== value) : [...next, value];
            answers.realEstateCounts = answers.realEstateCounts || {};
            for(const key of Object.keys(answers.realEstateCounts)){
              if(!next.includes(key)) delete answers.realEstateCounts[key];
            }
          }
          answers[q.id] = next;
          renderQuestion();
        }));
        document.querySelectorAll('.subchoice').forEach(btn=>btn.addEventListener('click',()=>{
          const type = btn.dataset.type;
          answers.realEstateCounts = answers.realEstateCounts || {};
          answers.realEstateCounts[type] = btn.dataset.value;
          renderQuestion();
        }));
      } else {
        $('choices').innerHTML = q.choices.map(([value,label]) => `<button type="button" class="choice ${answers[q.id]===value?'selected':''}" data-value="${value}">${label}</button>`).join('');
        document.querySelectorAll('.choice').forEach(btn=>btn.addEventListener('click',()=>{answers[q.id]=btn.dataset.value; renderQuestion();}));
      }
      $('prevBtn').style.visibility = step===0?'hidden':'visible';
      $('nextBtn').textContent = step===questions.length-1?'결과 보기':'다음';
    }
    function score(){
      let s = 18;
      for (const q of questions){
        if(q.type === 'multi'){
          const selected = answerValues(q.id);
          let subtotal = 0;
          for(const value of selected){
            const choice = q.choices.find(c=>c[0]===value);
            if(choice) subtotal += choice[2];
          }
          for(const type of selected){
            const detail = q.detailChoices?.[type];
            const countValue = answers.realEstateCounts?.[type];
            const countChoice = detail?.choices?.find(c => c[0] === countValue);
            if(countChoice) subtotal += countChoice[2];
          }
          s += Math.min(subtotal, 38);
        } else {
          const choice = q.choices.find(c=>c[0]===answers[q.id]);
          if(choice) s += choice[2];
        }
      }
      return Math.max(0, Math.min(100, s));
    }

    function renderReportPreview(s, level, realEstateText, overseasSignal){
      const unequalSignal = answers.unequal && answers.unequal !== 'no';
      const hasGift = answers.gift && answers.gift !== 'no';
      const willStatus = answers.will || 'unknown';
      const pages = [
        {
          title: '1. 내 상황 한눈 요약',
          items: [
            `위험도 ${s}점 · ${level}`,
            unequalSignal ? '특정 가족에게 더 많이 남길 계획이 있어 유류분 검토 신호가 있습니다.' : '특정 가족 몰아주기 신호는 강하지 않습니다.',
            hasGift ? '생전증여 또는 큰 재산 이전 여부를 정리할 필요가 있습니다.' : '생전증여 신호는 현재 입력 기준으로 크지 않습니다.'
          ]
        },
        {
          title: '2. 부동산·금전 보전',
          items: [
            realEstateText,
            '부동산은 현금처럼 나누기 어려워 평가액 차이와 보전 부담이 생길 수 있습니다.',
            '리포트에서는 “누가 무엇을 받을지”보다 “어떤 자료를 준비할지”를 먼저 정리합니다.'
          ]
        },
        {
          title: '3. 다음 준비자료',
          items: [
            willStatus === 'notary' ? '이미 공정증서 유언이 있다면 최신 가족·재산 상황과 맞는지 확인이 필요할 수 있습니다.' : '유언 방식은 자필·공정증서 중 무엇이 적합한지 상담 전 검토할 수 있습니다.',
            overseasSignal ? '해외 거주·외국 국적·해외 재산 요소는 국제상속 추가 진단 후보입니다.' : '해외 요소가 생기면 준거법·세금·절차가 달라질 수 있습니다.',
            '가족관계, 재산유형, 생전증여, 질문목록을 상담 전 자료로 정리합니다.'
          ]
        }
      ];
      $('reportPages').innerHTML = pages.map(page => `<div class="report-page"><b>${page.title}</b><ul>${page.items.map(item => `<li>${item}</li>`).join('')}</ul></div>`).join('');
    }
    function showResult(){
      const s = score();
      $('questionBox').style.display='none'; $('navBox').style.display='none'; $('resultBox').classList.add('show');
      $('scoreText').textContent = s; $('meter').style.setProperty('--meter', `${s}%`);
      const level = s < 35 ? '낮음' : s < 60 ? '주의' : s < 80 ? '높음' : '매우 높음';
      $('resultTitle').textContent = `상속분쟁 위험도: ${level}`;
      $('resultSummary').textContent = s < 35 ? '현재 입력 기준으로는 큰 위험 신호가 많지 않습니다. 다만 2026년 이후 달라진 유류분 기준과 유언 형식은 별도 확인이 필요합니다.' : s < 60 ? '일부 항목에서 검토 신호가 있습니다. 생전증여, 부동산, 금전 보전 부담, 유언 방식을 정리해두는 것이 좋습니다.' : '유류분·부동산·해외 요소·유언 방식 측면에서 사전 검토가 필요할 수 있습니다. 쉬운 2026 유류분 리포트, 공증 전 준비자료, 국제상속 추가 진단을 고려해볼 수 있습니다.';
      const realEstateTypes = answerValues('realEstate');
      const hasRealEstate = realEstateTypes.length && !realEstateTypes.includes('none');
      const realEstateQuestion = questions.find(q => q.id === 'realEstate');
      const selectedEstateLabels = realEstateTypes.filter(v => v !== 'none').map(type => {
        const detail = realEstateQuestion?.detailChoices?.[type];
        const countValue = answers.realEstateCounts?.[type];
        const countLabel = detail?.choices?.find(c => c[0] === countValue)?.[1];
        return detail ? `${detail.label} ${countLabel || ''}`.trim() : type;
      });
      const manyEstateItems = realEstateTypes.filter(v => v !== 'none').length >= 2 || Object.values(answers.realEstateCounts || {}).some(v => ['2','3','4plus','2plus','3plus','unknown'].includes(v));
      const realEstateText = !hasRealEstate
        ? '부동산이 없으면 분할·평가 쟁점은 상대적으로 낮습니다.'
        : manyEstateItems
          ? `보유 부동산(${selectedEstateLabels.join(', ')})이 여러 유형 또는 여러 건으로 확인되어 평가액 차이와 금전 보전 부담을 미리 검토하는 것이 좋습니다.`
          : `보유 부동산(${selectedEstateLabels.join(', ')})이 있어도 거주·처분 방식과 금전 보전 가능성은 미리 정리해두는 것이 좋습니다.`;
      const overseasSignal = answers.overseas && answers.overseas !== 'none';
      const boxes = [
        ['유류분 검토 신호', answers.unequal && answers.unequal !== 'no' ? '특정 가족에게 더 많이 남길 계획이 있어 유류분 검토가 필요할 수 있습니다.' : '현재 입력만으로는 큰 신호가 강하지 않습니다.'],
        ['금전 보전 부담 가능성', realEstateText],
        ['공증 전 유언 준비', s >= 60 ? '위험 신호가 있어 공정증서 유언 상담 전 준비자료를 정리해두는 것이 좋습니다.' : '자필 또는 공정증서 여부를 정하기 전, 가족관계와 재산 배분 의사를 정리해두는 것이 좋습니다.'],
        ['국제상속 검토 신호', overseasSignal ? '해외 거주·외국 국적·해외 재산 요소가 있어 한국 민법과 세법만으로 단순 판단하기 어려울 수 있습니다.' : '현재 입력 기준으로는 해외 요소 신호가 크지 않습니다.']
      ];
      $('resultGrid').innerHTML = boxes.map(([t,b])=>`<div class="result-box"><b>${t}</b><span>${b}</span></div>`).join('');
      renderReportPreview(s, level, realEstateText, overseasSignal);
    }
    $('prevBtn').addEventListener('click',()=>{ if(step>0){ step--; renderQuestion(); }});
    $('nextBtn').addEventListener('click',()=>{
      const q=questions[step];
      if(q.type === 'multi'){
        const selected = answerValues(q.id);
        if(!selected.length){ alert('답변을 선택해주세요.'); return; }
        for(const type of selected.filter(v => v !== 'none')){
          const detail = q.detailChoices?.[type];
          if(detail && !answers.realEstateCounts?.[type]){ alert(`${detail.label} 수량을 선택해주세요.`); return; }
        }
      } else if(!answers[q.id]){
        alert('답변을 선택해주세요.'); return;
      }
      if(step<questions.length-1){ step++; renderQuestion(); } else showResult();
    });
    function formatKst(value){
      if(!value) return '-';
      const d = new Date(value);
      if(Number.isNaN(d.getTime())) return value;
      const parts = new Intl.DateTimeFormat('ko-KR', {
        timeZone: 'Asia/Seoul', year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', hour12: false
      }).formatToParts(d).reduce((acc, part) => { acc[part.type] = part.value; return acc; }, {});
      return `${parts.year}-${parts.month}-${parts.day} ${parts.hour}:${parts.minute} KST`;
    }
    function showSaveStatus(ok, title, detail){
      const el = $('saveMsg');
      el.className = `save-panel show ${ok ? 'status-ok' : 'status-warn'}`;
      el.innerHTML = `${title}${detail ? `<small>${detail}</small>` : ''}`;
    }
    async function saveLead(){
      const selectedProducts = [...document.querySelectorAll('.product-chip.selected')].map(btn => btn.dataset.product);
      const leadAnswers = { ...answers, interest_products: selectedProducts, engagement: {...engagement}, consents: { privacy:Boolean(privacyConsent?.checked), marketing: Boolean(marketingConsent?.checked) } };
      const lead = { name:$('leadName').value.trim(), email:$('leadEmail').value.trim(), memo:$('leadMemo').value.trim(), score:score(), answers: leadAnswers, created_at:new Date().toISOString(), page_url:location.href, app_version:'0.10.2-email-only-guide-request'  };
      if(!lead.name || !lead.email){ showSaveStatus(false, '이름 또는 닉네임과 이메일을 입력해주세요.', '필수 입력칸은 노란색 테두리로 표시되어 있습니다.'); return; }
      if(!privacyConsent?.checked){ showSaveStatus(false, '개인정보 수집·이용 동의를 확인해주세요.', '안내자료 신청을 위해 필요한 확인입니다.'); return; }
      if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(lead.email)){ showSaveStatus(false, '이메일 형식을 확인해주세요.', '예: name@example.com'); return; }
      let serverOk = false;
      let serverMessage = '';
      const url = CONFIG.VITE_SUPABASE_URL; const key = CONFIG.VITE_SUPABASE_ANON_KEY; const table = CONFIG.VITE_SUPABASE_LEADS_TABLE || 'leads';
      if(url && key){
        try{
          const res = await fetch(`${url.replace(/\/$/,'')}/rest/v1/${table}`, { method:'POST', headers:{ apikey:key, Authorization:`Bearer ${key}`, 'Content-Type':'application/json', Prefer:'return=minimal' }, body: JSON.stringify(lead) });
          serverOk = res.ok;
          if(!res.ok){
            const text = await res.text();
            serverMessage = `저장 응답 ${res.status}${text ? ` · ${text.slice(0, 120)}` : ''}`;
          }
        } catch(e) { serverOk = false; serverMessage = e?.message || '네트워크 오류'; }
      } else {
        serverMessage = '저장 설정을 확인할 수 없습니다.';
      }
      const saved = {...lead, storage: serverOk?'supabase+local':'local', server_ok: serverOk, server_message: serverMessage};
      const stored = JSON.parse(localStorage.getItem('ansim_leads') || '[]'); stored.unshift(saved); localStorage.setItem('ansim_leads', JSON.stringify(stored));
      if(serverOk) showSaveStatus(true, '안내자료 신청이 완료되었습니다.', `접수 시각 · ${formatKst(lead.created_at)}`);
      else showSaveStatus(false, '저장을 완료하지 못했습니다.', '네트워크 상태를 확인한 뒤 잠시 후 다시 시도해주세요.');
    }

    function selectProductFromOffer(product){
      engagement.last_offer = product;
      if(!engagement.offer_clicks.includes(product)) engagement.offer_clicks.push(product);
      document.querySelectorAll('.product-chip').forEach(btn => {
        btn.classList.toggle('selected', btn.dataset.product === product || btn.classList.contains('selected'));
      });
      const target = document.querySelector(`.product-chip[data-product="${product}"]`);
      if(target) target.classList.add('selected');
      const banner = $('intentBanner');
      if(banner){ banner.classList.add('show'); banner.textContent = '관심 상품이 선택되었습니다. 필수 확인 후 알림 신청을 저장할 수 있습니다.'; }
      document.querySelector('.lead-form')?.scrollIntoView({behavior:'smooth', block:'center'});
    }
    document.querySelectorAll('.offer-button').forEach(btn => btn.addEventListener('click', () => selectProductFromOffer(btn.dataset.selectProduct)));
    $('sampleReportLink')?.addEventListener('click', () => { engagement.sample_pdf_clicked = true; });
    document.querySelectorAll('[data-waitlist]').forEach(btn => btn.addEventListener('click', () => {
      engagement.waitlist_intent = btn.dataset.waitlist;
      if(btn.dataset.waitlist === 'sample_first') engagement.sample_pdf_clicked = true;
      const banner = $('intentBanner');
      if(banner){ banner.classList.add('show'); banner.textContent = btn.dataset.waitlist === 'payment_open' ? '안내자료가 선택되었습니다.' : '안내자료가 선택되었습니다.'; }
      document.querySelector('.lead-form')?.scrollIntoView({behavior:'smooth', block:'center'});
    }));

    document.querySelectorAll('.product-chip').forEach(btn => btn.addEventListener('click', () => btn.classList.toggle('selected')));
    $('saveLead').addEventListener('click', saveLead);
    setupInputLanguageHelpers();
    renderQuestion();
  </script>
</body>
</html>
